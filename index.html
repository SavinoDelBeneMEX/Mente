    border: 1px dashed var(--line);
    border-radius: 4px;
  }

  /* ---------- week grid ---------- */
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  @media (max-width: 860px) and (min-width: 601px) {
    .week-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
  }
  @media (max-width: 600px) {
    .week-grid { grid-template-columns: 1fr; }
    .day-col { min-height: 0; flex-direction: row; align-items: flex-start; flex-wrap: wrap; padding: 12px; }
    .day-head { flex-direction: column; align-items: flex-start; gap: 0; flex: none; width: 54px; }
    .day-tasks { flex: 1; min-width: 0; }
  }
  .day-col {
    background: var(--surface); border: 1px solid var(--line); border-radius: 4px;
    padding: 12px; min-height: 130px; display: flex; flex-direction: column; gap: 8px;
  }
  .day-col.is-today { border-color: var(--ink); background: var(--surface); }
  .day-head { display: flex; justify-content: space-between; align-items: baseline; }
  .day-name { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); font-weight: 700; }
  .day-col.is-today .day-name { color: var(--ink); }
  .day-num { font-size: 14px; font-variant-numeric: tabular-nums; color: var(--faint); font-weight: 600; }
  .day-col.is-today .day-num { color: var(--ink); }
  .day-tasks { display: flex; flex-direction: column; gap: 5px; }
  .mini-task {
    font-size: 12.5px; padding: 7px 9px; border-radius: 2px;
    background: var(--surface-sunken); border-left: 2px solid var(--cat-color, var(--accent));
    display: flex; gap: 6px; align-items: flex-start; cursor: pointer; min-height: 32px;
    touch-action: manipulation;
  }
  .day-col.is-today .mini-task { background: var(--surface-sunken); }
  .mini-task.done { opacity: 0.5; text-decoration: line-through; }
  .mini-time { color: var(--muted); font-weight: 600; font-variant-numeric: tabular-nums; flex: none; }
  .mini-empty { font-size: 12px; color: var(--faint); padding: 4px 2px; }

  /* ---------- stats ---------- */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 8px; }
  @media (max-width: 640px) { .stats-grid { grid-template-columns: 1fr; } }
  .stat-card { border: 1px solid var(--line); border-radius: 4px; padding: 20px; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--faint); font-weight: 700; margin-bottom: 10px; }
  .stat-value { font-size: 30px; font-weight: 700; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
  .stat-sub { font-size: 12.5px; color: var(--muted); margin-top: 6px; }
  .stats-bars { display: flex; align-items: flex-end; gap: 14px; padding: 20px 4px 8px; border-bottom: 1px solid var(--line); }
  .stats-bar-col { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
  .stats-bar { width: 100%; max-width: 28px; background: var(--ink); border-radius: 2px 2px 0 0; }
  .stats-bar-label { font-size: 10.5px; text-transform: uppercase; color: var(--faint); font-weight: 600; }
  .stats-cat-list { display: flex; flex-direction: column; }
  .stats-cat-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0; border-bottom: 1px solid var(--line); font-size: 14px;
  }
  .stats-cat-row:last-child { border-bottom: none; }
  .stats-cat-row span:first-child { font-weight: 500; }
  .stats-cat-row span:last-child { color: var(--muted); font-variant-numeric: tabular-nums; }

  /* ---------- month calendar ---------- */
  .mes-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .mes-title { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
  .mes-nav { display: flex; align-items: center; gap: 18px; }
  .mes-nav button {
    background: none; border: none; color: var(--muted); font-size: 18px;
    cursor: pointer; padding: 2px 4px; line-height: 1; touch-action: manipulation;
  }
  .mes-nav button:hover { color: var(--ink); }
  .mes-today-btn {
    font-size: 12px; text-decoration: underline; text-underline-offset: 2px;
    color: var(--muted); font-weight: 500;
  }
  .mes-today-btn:hover { color: var(--ink); }
  .mes-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid var(--line); border-left: 1px solid var(--line); }
  .mes-weekday {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--faint); font-weight: 700;
    text-align: center; padding: 8px 0; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line);
  }
  .mes-cell {
    min-height: 80px; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line);
    padding: 8px; cursor: pointer; display: flex; flex-direction: column; gap: 6px;
    touch-action: manipulation; transition: background .1s;
  }
  .mes-cell.empty { cursor: default; }
  .mes-cell:hover:not(.empty) { background: var(--surface-sunken); }
  .mes-cell.is-selected { background: var(--surface-sunken); }
  .mes-daynum { font-size: 13px; color: var(--ink); font-variant-numeric: tabular-nums; }
  .mes-cell.is-today .mes-daynum { font-weight: 700; text-decoration: underline; text-underline-offset: 3px; }
  .mes-cell.empty .mes-daynum { color: var(--faint); }
  .mes-dots { display: flex; gap: 3px; flex-wrap: wrap; }
  .mes-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--ink); flex: none; }
  .mes-day-panel { margin-top: 36px; }
  .mes-day-panel-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.01em; }
  .mes-quick-add {
    margin-top: 14px; display: flex; gap: 6px;
  }
  .mes-quick-add input {
    flex: 1; font-size: 14px; padding: 10px 2px; border-radius: 0;
    border: none; border-bottom: 1px solid var(--line); background: none; color: var(--ink); font-family: inherit;
  }
  .mes-quick-add input:focus { outline: none; border-bottom-color: var(--ink); }
  @media (max-width: 640px) {
    .mes-cell { min-height: 52px; padding: 6px 4px; gap: 3px; }
    .mes-daynum { font-size: 11.5px; }
    .mes-weekday { font-size: 9.5px; padding: 6px 0; }
  }

  /* ---------- filters ---------- */
  .filters { display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-btn {
    border: none; background: none; color: var(--muted);
    padding: 4px 0; border-radius: 0; font-size: 13px; font-weight: 500; letter-spacing: 0.01em;
    cursor: pointer; min-height: 0; touch-action: manipulation;
    border-bottom: 1px solid transparent;
  }
  .filter-btn:hover { color: var(--ink); }
  .filter-btn.active { background: none; border-bottom-color: var(--ink); color: var(--ink); font-weight: 700; }

  /* ---------- day planner ---------- */
  .day-plan { display: flex; flex-direction: column; border-top: 1px solid var(--line); border-radius: 0; overflow: hidden; }
  .day-plan-row { display: flex; gap: 12px; border-bottom: 1px solid var(--line); padding: 8px 6px; min-height: 50px; }
  .day-plan-row.now { background: var(--surface-sunken); }
  .day-plan-hour {
    width: 52px; flex: none; font-size: 12px; font-weight: 700; color: var(--faint);
    font-variant-numeric: tabular-nums; padding-top: 6px;
  }
  .day-plan-row.now .day-plan-hour { color: var(--ink); }
  .day-plan-slot { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
  .day-plan-task {
    border-left: 2px solid var(--cat-color, var(--accent));
    background: var(--surface-sunken); border-radius: 2px;
    padding: 8px 11px; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 8px; touch-action: manipulation;
  }
  .day-plan-row.now .day-plan-task { background: var(--surface); }
  .day-plan-task.done { opacity: 0.5; text-decoration: line-through; }
  .day-plan-task-time { color: var(--muted); font-weight: 600; font-variant-numeric: tabular-nums; flex: none; }
  .day-plan-add {
    background: none; border: 1px dashed var(--line); color: var(--faint);
    border-radius: 2px; padding: 7px 11px; font-size: 12px; font-weight: 600;
    cursor: pointer; text-align: left; touch-action: manipulation; min-height: 34px;
  }
  .day-plan-add:hover { border-color: var(--ink); color: var(--ink); }
  .day-plan-add-input { display: flex; gap: 6px; }
  .day-plan-add-input input {
    flex: 1; font-size: 13px; padding: 7px 10px; border-radius: 2px;
    border: 1px solid var(--line); background: var(--surface-sunken); color: var(--ink); font-family: inherit;
  }
  .day-plan-unscheduled { margin-bottom: 18px; }

  /* ---------- focus mode ---------- */
  .focus-wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 20px 0 20px; }
  .focus-card {
    width: 100%; max-width: 460px;
    background: var(--surface); border: 1px solid var(--line); border-radius: 4px;
    box-shadow: none; padding: 48px 36px; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .focus-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); font-weight: 700; }
  .focus-title { font-size: 22px; font-weight: 700; text-wrap: balance; letter-spacing: -0.01em; }
  .focus-cat { font-size: 12px; font-weight: 600; }
  .timer-ring { position: relative; width: 190px; height: 190px; margin: 8px 0; }
  .timer-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
  .timer-track { fill: none; stroke: var(--surface-sunken); stroke-width: 2; }
  .timer-fill { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: butt; transition: stroke-dashoffset 1s linear; }
  .timer-center {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .timer-time { font-size: 34px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .timer-mode { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
  .focus-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .focus-btn {
    border: 1px solid transparent; border-radius: 4px; padding: 12px 20px; font-size: 13px; font-weight: 700; letter-spacing: 0.01em;
    cursor: pointer; touch-action: manipulation; min-height: 46px;
    transition: opacity .15s;
  }
  .focus-btn:active { opacity: 0.7; }
  .focus-btn.primary { background: var(--ink); color: var(--bg); }
  .focus-btn.primary:hover { opacity: 0.85; }
  .focus-btn.ghost { background: var(--surface); color: var(--ink); border-color: var(--line); }
  .focus-btn.complete { background: var(--surface); color: var(--ink); border-color: var(--ink); }
  .focus-sub { width: 100%; text-align: left; margin-top: 4px; }
  .focus-pick { margin-top: 6px; font-size: 12.5px; color: var(--muted); }
  .focus-pick select {
    border: 1px solid var(--line); border-radius: 4px; padding: 6px 10px; font-size: 12.5px;
    background: var(--surface-sunken); color: var(--ink); font-family: inherit; margin-top: 4px; max-width: 100%;
  }
  .focus-empty {
    max-width: 420px; text-align: center; color: var(--muted); font-size: 14.5px;
    background: var(--surface); border: 1px dashed var(--line); border-radius: 4px; padding: 32px 22px;
  }

  /* ---------- confetti ---------- */
  .confetti-piece {
    position: fixed; top: 0; left: 0; width: 6px; height: 6px; border-radius: 1px;
    pointer-events: none; z-index: 999; opacity: 1;
    animation: confetti-fall 700ms ease-out forwards;
  }
  @keyframes confetti-fall {
    to { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; }
  }
</style>
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="brand-mark" style="margin:0 auto 14px;">🧠</div>
    <h1 class="rounded-face" style="text-align:center;font-size:24px;margin:0 0 4px;">Mente</h1>
    <p style="text-align:center;color:var(--muted);font-size:13.5px;margin:0 0 20px;">Iniciá sesión para sincronizar tus tareas y recibir recordatorios push.</p>
    <input type="email" id="authEmail" placeholder="Email" autocomplete="email" required />
    <input type="password" id="authPassword" placeholder="Contraseña" autocomplete="current-password" required />
    <div class="auth-error" id="authError"></div>
    <button type="button" class="auth-submit" id="authSignIn">Ingresar</button>
    <button type="button" class="auth-switch" id="authSignUp">¿No tienes cuenta? Crea una</button>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div class="brandblock">
      <div class="brand-mark">🧠</div>
      <div class="brand-text">
        <div class="brand rounded-face">Mente</div>
        <div class="tagline" id="todayDate"></div>
      </div>
    </div>
    <div class="headctrls">
      <div class="ring-wrap" title="Progreso de hoy">
        <svg viewBox="0 0 40 40">
          <circle class="ring-track" cx="20" cy="20" r="16"></circle>
          <circle class="ring-fill" id="ringFill" cx="20" cy="20" r="16" stroke-dasharray="100.5" stroke-dashoffset="100.5"></circle>
        </svg>
        <div class="ring-pct" id="ringPct">0%</div>
      </div>
      <button class="pillbtn streak-chip" id="streakChip" title="Racha de días activos">🔥 <span id="streakNum">0</span></button>
      <button class="pillbtn" id="soundBtn" data-on="true" title="Sonido al completar">🔊</button>
      <button class="pillbtn" id="notifBtn" data-on="false">🔔 <span id="notifLabel">Recordatorios</span></button>
      <button class="pillbtn" id="signOutBtn" title="Cerrar sesión">Salir</button>
    </div>
  </div>

  <div class="scope-switch" id="scopeSwitch">
    <button type="button" class="scope-btn active" data-scope="todo">Todo</button>
    <button type="button" class="scope-btn" data-scope="personal">🏠 Personal</button>
    <button type="button" class="scope-btn" data-scope="trabajo">💼 Trabajo</button>
  </div>

  <div class="inbox-quickadd">
    <input type="text" id="inboxQuickInput" placeholder="Captura rápida, sin decidir nada todavía…" autocomplete="off" />
    <button type="button" id="inboxQuickBtn">+ Inbox</button>
  </div>

  <div class="quickadd">
    <form id="addForm">
      <div class="qa-main">
        <input type="text" id="inpTitle" placeholder="¿Qué necesitás hacer?" required autocomplete="off" />
        <button type="submit" class="qa-add">Agregar</button>
      </div>
      <div class="cat-chips" id="catChips"></div>
      <button type="button" class="qa-more-toggle" id="qaMoreToggle">+ fecha, hora, prioridad y repetición</button>
      <div class="qa-more" id="qaMore">
        <input type="date" id="inpDate" />
        <input type="time" id="inpTime" />
        <div class="pri-chips" id="priChips"></div>
        <div class="repeat-chips" id="repeatChips"></div>
      </div>
    </form>
  </div>

  <div class="tabs">
    <button class="tab active" data-view="hoy"><span class="tab-icon">☀️</span><span class="tab-label">Hoy</span> <span class="count" id="cntHoy">0</span></button>
    <button class="tab" data-view="inbox"><span class="tab-icon">📥</span><span class="tab-label">Inbox</span> <span class="count" id="cntInbox">0</span></button>
    <button class="tab" data-view="dia"><span class="tab-icon">🗓️</span><span class="tab-label">Día</span></button>
    <button class="tab" data-view="enfoque"><span class="tab-icon">🎯</span><span class="tab-label">Enfoque</span></button>
    <button class="tab" data-view="semana"><span class="tab-icon">📅</span><span class="tab-label">Semana</span></button>
    <button class="tab" data-view="mes"><span class="tab-icon">📆</span><span class="tab-label">Mes</span></button>
    <button class="tab" data-view="tareas"><span class="tab-icon">📋</span><span class="tab-label">Tareas</span> <span class="count" id="cntTareas">0</span></button>
    <button class="tab" data-view="stats"><span class="tab-icon">📊</span><span class="tab-label">Stats</span></button>
  </div>

  <div class="view active" id="view-hoy">
    <div id="hoyOverdue"></div>

    <div class="section-label">Tus 3 prioridades de hoy</div>
    <div class="mit-row" id="mitRow"></div>

    <div class="section-label">
      <span>Resto de hoy</span>
      <span class="toggle-switch" id="hideDoneHoy"><span class="track"><span class="knob"></span></span> ocultar hechas</span>
    </div>
    <div class="task-list" id="hoyList"></div>
  </div>

  <div class="view" id="view-inbox">
    <p class="inbox-hint">Todo lo que capturás acá queda sin fecha hasta que lo proceses: asignale un día con "→ Hoy" o "📅 Fecha".</p>
    <div class="task-list" id="inboxList"></div>
  </div>

  <div class="view" id="view-dia">
    <div id="diaWrap"></div>
  </div>

  <div class="view" id="view-enfoque">
    <div class="focus-wrap" id="focusWrap"></div>
  </div>

  <div class="view" id="view-semana">
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <div class="view" id="view-mes">
    <div id="mesWrap"></div>
  </div>

  <div class="view" id="view-tareas">
    <input type="text" id="tareasSearchInput" class="tareas-search" placeholder="Buscar tareas…" autocomplete="off" />
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="todas">Todas</button>
      <button class="filter-btn" data-filter="pendientes">Pendientes</button>
      <button class="filter-btn" data-filter="hechas">Hechas</button>
    </div>
    <div class="task-list" id="tareasList"></div>
  </div>

  <div class="view" id="view-stats">
    <div id="statsWrap"></div>
    <div class="section-label">Datos</div>
    <button type="button" class="pillbtn" id="exportBtn" style="border:1px solid var(--line);padding:10px 16px;">⬇ Exportar datos (JSON)</button>
  </div>
</div>

<script>
(function () {
  var cfg = window.MENTE_CONFIG;
  var sb = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
  var currentUserId = null;

  var STREAK_KEY = 'mente_streak_days';
  var PREFS_KEY = 'mente_prefs_v1';

  var CATS = [
    { id: 'personal', label: 'Personal', color: 'var(--accent)', icon: '🏠' },
    { id: 'trabajo', label: 'Trabajo', color: 'var(--ink)', icon: '💼' }
  ];
  function catInfo(id) { return CATS.find(function (c) { return c.id === id; }) || CATS[0]; }

  var tasks = [];

  var streakDays = [];
  try { streakDays = JSON.parse(localStorage.getItem(STREAK_KEY)) || []; } catch (e) { streakDays = []; }

  var prefs = { hideDoneHoy: false, sound: true, scopeFilter: 'todo' };
  try { prefs = Object.assign(prefs, JSON.parse(localStorage.getItem(PREFS_KEY)) || {}); } catch (e) {}
  function inScope(t) { return prefs.scopeFilter === 'todo' || t.category === prefs.scopeFilter; }

  function saveStreak() { localStorage.setItem(STREAK_KEY, JSON.stringify(streakDays)); }
  function savePrefs() { localStorage.setItem(PREFS_KEY, JSON.stringify(prefs)); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function todayISO() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function fmtDay(date) { return date.toLocaleDateString('es-ES', { weekday: 'short' }).replace('.', ''); }
  function isoFromDate(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
  function addDays(dateStr, n) { var d = new Date(dateStr + 'T00:00:00'); d.setDate(d.getDate() + n); return isoFromDate(d); }
  function nextRepeatDate(dateStr, repeat) {
    if (!repeat) return null;
    if (repeat.type === 'daily') return addDays(dateStr, 1);
    if (repeat.type === 'every') return addDays(dateStr, repeat.n || 1);
    if (repeat.type === 'weekdays') {
      var d = new Date(dateStr + 'T00:00:00');
      do { d.setDate(d.getDate() + 1); } while (d.getDay() === 0 || d.getDay() === 6);
      return isoFromDate(d);
    }
    return null;
  }
  function repeatLabel(repeat) {
    if (!repeat) return '';
    if (repeat.type === 'daily') return '🔁 Diario';
    if (repeat.type === 'weekdays') return '🔁 Lun-Vie';
    if (repeat.type === 'every') return '🔁 cada ' + repeat.n + ' días';
    return '';
  }
  function reminderLabel(r) {
    if (r.repeat === 'daily') return '🔁 Diario · ' + r.time;
    if (r.repeat === 'weekdays') return '🔁 Días hábiles · ' + r.time;
    if (r.repeat === 'every') return '🔁 cada ' + r.n + ' días · ' + r.time;
    var day = (r.date === todayStr) ? 'Hoy' : new Date(r.date + 'T00:00:00').toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
    return day + ' ' + r.time;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }
  function hhmm(t) { return t ? String(t).slice(0, 5) : null; }

  var todayStr = todayISO();
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
  document.getElementById('inpDate').value = todayStr;

  /* ---------- Supabase: mapear filas <-> objetos en memoria ---------- */
  function rowToTask(row) {
    return {
      id: row.id,
      title: row.title,
      date: row.date,
      time: hhmm(row.time),
      priority: row.priority,
      category: row.category,
      star: row.star,
      done: row.done,
      repeat: row.repeat || null,
      seriesId: row.series_id || null,
      subtasks: row.subtasks || [],
      notes: row.notes || '',
      createdAt: row.created_at,
      reminders: (row.reminders || []).map(function (r) {
        return { id: r.id, time: hhmm(r.time), repeat: r.repeat, date: r.date, n: r.n };
      })
    };

  function reminderFieldsFromTaskRepeat(repeat) {
    if (!repeat) return { repeat: 'once' };
    if (repeat.type === 'daily') return { repeat: 'daily' };
    if (repeat.type === 'weekdays') return { repeat: 'weekdays' };
    if (repeat.type === 'every') return { repeat: 'every', n: repeat.n };
    return { repeat: 'once' };
  }
  async function ensureTaskReminder(t) {
    if (!t.time) return;
    var rf = reminderFieldsFromTaskRepeat(t.repeat);
    var inserted = await dbInsertReminder(t.id, { time: t.time, repeat: rf.repeat, date: t.date, n: rf.n || null });
    if (inserted) t.reminders.push(inserted);
  }
  async function loadTasks() {
    var res = await sb.from('tasks').select('*, reminders(*)').order('created_at', { ascending: true });
    if (res.error) { console.error(res.error); return; }
    tasks = (res.data || []).map(rowToTask);
    var backfills = [];
    tasks.forEach(function (t) {
      if (t.repeat && !t.seriesId) { t.seriesId = t.id; dbUpdateTask(t.id, { series_id: t.id }); }
      // Repara tareas con fecha y hora que quedaron sin ningún recordatorio (por eso no avisaban).
      if (t.time && !t.done && t.reminders.length === 0) backfills.push(ensureTaskReminder(t));
    });
    if (backfills.length) await Promise.all(backfills);
    renderAll();
  }

  /* ---------- sound ---------- */
  var audioCtx = null;
  function getAudioCtx() {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function playTone(ctx, t0, freq, startAt, dur, gainPeak, type) {
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0 + startAt);
    gain.gain.setValueAtTime(0.0001, t0 + startAt);
    gain.gain.linearRampToValueAtTime(gainPeak, t0 + startAt + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + startAt + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t0 + startAt);
    osc.stop(t0 + startAt + dur + 0.02);
    return osc;
  }
  function chime() {
    if (!prefs.sound) return;
    try {
      var ctx = getAudioCtx();
      var t0 = ctx.currentTime;
      playTone(ctx, t0, 660, 0, 0.22, 0.12, 'triangle');
      playTone(ctx, t0, 880, 0.09, 0.24, 0.12, 'triangle');
    } catch (e) {}
  }
  function addSound() {
    if (!prefs.sound) return;
    try {
      var ctx = getAudioCtx();
      playTone(ctx, ctx.currentTime, 720, 0, 0.1, 0.09, 'sine');
    } catch (e) {}
  }
  function deleteSound() {
    if (!prefs.sound) return;
    try {
      var ctx = getAudioCtx();
      var t0 = ctx.currentTime;
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(420, t0);
      osc.frequency.exponentialRampToValueAtTime(160, t0 + 0.16);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.linearRampToValueAtTime(0.09, t0 + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.18);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t0);
      osc.stop(t0 + 0.2);
    } catch (e) {}
  }
  function starSound() {
    if (!prefs.sound) return;
    try {
      var ctx = getAudioCtx();
      var t0 = ctx.currentTime;
      playTone(ctx, t0, 988, 0, 0.16, 0.1, 'triangle');
      playTone(ctx, t0, 1318.5, 0.06, 0.18, 0.09, 'triangle');
    } catch (e) {}
  }

  /* ---------- confetti ---------- */
  function confettiBurst(x, y) {
    var colors = ['#1a1a1a', '#4a4a48', '#6e6e6b', '#a8a8a4'];
    for (var i = 0; i < 16; i++) {
      var el = document.createElement('div');
      el.className = 'confetti-piece';
      var angle = Math.random() * Math.PI * 2;
      var dist = 40 + Math.random() * 60;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.background = colors[i % colors.length];
      el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      el.style.setProperty('--dy', (Math.sin(angle) * dist - 20) + 'px');
      el.style.setProperty('--rot', (Math.random() * 360) + 'deg');
      document.body.appendChild(el);
      (function (node) { setTimeout(function () { node.remove(); }, 950); })(el);
    }
  }

  function currentStreak() {
    var set = {};
    streakDays.forEach(function (d) { set[d] = true; });
    var count = 0;
    var cursor = new Date();
    if (!set[todayStr]) cursor.setDate(cursor.getDate() - 1);
    while (true) {
      var iso = cursor.getFullYear() + '-' + String(cursor.getMonth()+1).padStart(2,'0') + '-' + String(cursor.getDate()).padStart(2,'0');
      if (set[iso]) { count++; cursor.setDate(cursor.getDate() - 1); } else break;
    }
    return count;
  }

  function urlBase64ToUint8Array(base64String) {
    var padding = '='.repeat((4 - base64String.length % 4) % 4);
    var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    var rawData = window.atob(base64);
    var outputArray = new Uint8Array(rawData.length);
    for (var i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
    return outputArray;
  }
  var notifBtn = document.getElementById('notifBtn');

  function refreshNotifBtn() {
    var granted = ('Notification' in window) && Notification.permission === 'granted';
    notifBtn.dataset.on = granted ? 'true' : 'false';
    notifLabel.textContent = granted ? 'Activos' : 'Recordatorios';
  }
  function isIos() { return /iphone|ipad|ipod/i.test(navigator.userAgent); }
  function isStandalone() { return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true; }
  notifBtn.addEventListener('click', async function () {
    if (isIos() && !isStandalone()) {
      alert('En iPhone, los recordatorios push solo funcionan si agregás Mente a tu pantalla de inicio.\n\n1. Tocá el botón de compartir (el cuadrado con la flecha) en Safari.\n2. Elegí "Agregar a inicio".\n3. Abrí Mente desde el ícono que quedó en tu pantalla de inicio (no desde Safari).\n4. Ahí volvé a tocar "Recordatorios".');
      return;
    }
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      alert('Este navegador no soporta notificaciones push.');
      return;
    }
    var permission = await Notification.requestPermission();
    if (permission !== 'granted') { refreshNotifBtn(); return; }
    try {
      var reg = await navigator.serviceWorker.ready;
      var sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(cfg.VAPID_PUBLIC_KEY)
      });
      var subJson = sub.toJSON();
      await sb.from('push_subscriptions').upsert({
        user_id: currentUserId, endpoint: subJson.endpoint,
        p256dh: subJson.keys.p256dh, auth: subJson.keys.auth
      }, { onConflict: 'endpoint' });
    } catch (e) { console.error(e); alert('No se pudo activar el push: ' + e.message); }
    refreshNotifBtn();
  });

    if (!/^\d{1,2}:\d{2}$/.test(val)) { alert('Formato inválido. Usá HH:MM, por ejemplo 09:30.'); return; }
    var parts = val.split(':');
    var hh = String(Math.min(23, parseInt(parts[0], 10))).padStart(2, '0');
    var mm = String(Math.min(59, parseInt(parts[1], 10))).padStart(2, '0');
    var newTime = hh + ':' + mm;
    t.time = newTime;
    dbUpdateTask(id, { time: newTime });

  }
  function removeSubtask(taskId, subId) {
    var t = tasks.find(function (x) { return x.id === taskId; });
    if (!t) return;
    t.subtasks = t.subtasks.filter(function (x) { return x.id !== subId; });
    renderAll();
    dbUpdateTask(taskId, { subtasks: t.subtasks });
    deleteSound();
    setTimeout(function () { var el = document.querySelector('.subtasks[data-owner="' + taskId + '"]'); if (el) el.classList.add('open'); }, 0);
  }
  async function addReminder(taskId, opts) {
    var t = tasks.find(function (x) { return x.id === taskId; });
    if (!t || !opts.time) return;
    if ((opts.repeat === 'once' || opts.repeat === 'every') && !opts.date) return;
    var inserted = await dbInsertReminder(taskId, {
      time: opts.time, repeat: opts.repeat, date: opts.date || null,
      n: opts.repeat === 'every' ? Math.max(2, opts.n || 2) : null
    });
    if (!inserted) return;
    t.reminders.push(inserted);
    renderAll();
    addSound();
    setTimeout(function () { var el = document.querySelector('.subtasks[data-owner="' + taskId + '"]'); if (el) el.classList.add('open'); }, 0);
  }
  function removeReminder(taskId, remId) {
    var t = tasks.find(function (x) { return x.id === taskId; });
    if (!t) return;
    t.reminders = t.reminders.filter(function (x) { return x.id !== remId; });
    renderAll();
    dbDeleteReminder(remId);
    deleteSound();
    setTimeout(function () { var el = document.querySelector('.subtasks[data-owner="' + taskId + '"]'); if (el) el.classList.add('open'); }, 0);
  }

  /* ---------- rendering ---------- */
  function taskRow(t) {
    var cat = catInfo(t.category);
    var meta = '<span class="chip cat" style="--cat-color:' + cat.color + '">' + cat.icon + ' ' + cat.label + '</span>';
    if (t.repeat) meta += '<span class="chip time" style="background:var(--surface-sunken);color:var(--muted)">' + repeatLabel(t.repeat) + '</span>';
    if (t.priority === 'alta' && !t.done) meta += '<span class="chip urgent">🔴 Urgente</span>';
    if (t.date === todayStr && t.time) {
      var overdue = !t.done && new Date(t.date + 'T' + t.time) < new Date();
      meta += '<span class="chip ' + (overdue ? 'overdue' : 'time') + '">⏰ ' + t.time + '</span>';
      meta += '<button type="button" class="snooze-btn" data-action="snooze">+15 min</button>';
    } else if (t.time) {
      meta += '<span class="chip time">⏰ ' + t.time + '</span>';
      meta += '<button type="button" class="snooze-btn" data-action="snooze">+15 min</button>';
    }
    if (t.time) meta += '<button type="button" class="snooze-btn" data-action="edittime">✎ hora</button>';
    if (t.date && t.date !== todayStr) {
      var d = new Date(t.date + 'T00:00:00');
      meta += '<span class="chip time" style="background:var(--surface-sunken);color:var(--muted)">' + d.toLocaleDateString('es-ES', {day:'numeric', month:'short'}) + '</span>';
    }
    if (t.reminders && t.reminders.length) {
      meta += '<span class="chip time">🔔 ' + t.reminders.length + '</span>';
    }
    if (!t.date) {
      meta += '<button type="button" class="snooze-btn" data-action="assigntoday">→ Hoy</button>' +
        '<button type="button" class="snooze-btn" data-action="assigndate">📅 Fecha</button>';
    }
    var subDone = t.subtasks.filter(function (s) { return s.done; }).length;
    var subTotal = t.subtasks.length;
    var subProgress = subTotal ? '<div class="subtask-progress"><span>' + subDone + '/' + subTotal + ' pasos</span><span class="subtask-bar"><span class="subtask-bar-fill" style="width:' + Math.round(subDone/subTotal*100) + '%"></span></span></div>' : '';
    var remindersListHtml = t.reminders.map(function (r) {
      return '<div class="reminder-row" data-rem="' + r.id + '"><span class="chip time">🔔 ' + reminderLabel(r) + '</span>' +
        '<button type="button" class="reminder-del" data-action="remdel">×</button></div>';
    }).join('');
    var subtasksHtml = '<div class="subtasks" data-owner="' + t.id + '">' +
      '<div class="detail-label">Pasos</div>' +
      t.subtasks.map(function (s) {
        return '<div class="subtask-row' + (s.done ? ' done' : '') + '" data-sub="' + s.id + '">' +
          '<div class="subtask-check" data-action="subtoggle">' + (s.done ? '✓' : '') + '</div>' +
          '<div class="subtask-title">' + escapeHtml(s.title) + '</div>' +
          '<button type="button" class="subtask-del" data-action="subdel">×</button></div>';
      }).join('') +
      '<div class="subtask-add"><input type="text" placeholder="Agregar paso…" data-action="subinput" /><button type="button" data-action="subadd">Agregar</button></div>' +
      '<div class="detail-label">Recordatorios</div>' +
      '<div class="reminder-list">' + remindersListHtml + '</div>' +
      '<div class="reminder-add">' +
        '<div class="repeat-chips">' +
          '<button type="button" class="chip-select active" data-remrep="once">Una vez</button>' +
          '<button type="button" class="chip-select" data-remrep="daily">🔁 Diario</button>' +
          '<button type="button" class="chip-select" data-remrep="weekdays">🔁 Días hábiles</button>' +
          '<button type="button" class="chip-select" data-remrep="every">🔁 Cada…</button>' +
        '</div>' +
        '<div class="reminder-add-fields">' +
          '<input type="date" data-action="reminderdate" value="' + (t.date || todayStr) + '" />' +
          '<span class="repeat-inline" data-remn-wrap style="display:none;"><input type="number" min="2" max="60" value="2" data-action="remindern" /> días</span>' +
          '<input type="time" data-action="remindertime" />' +
          '<button type="button" data-action="remadd">🔔 Agregar</button>' +
        '</div>' +
      '</div>' +
      '<div class="detail-label">Notas</div>' +
      '<textarea class="notes-input" data-action="notes" placeholder="Agregar una nota…" rows="2">' + escapeHtml(t.notes || '') + '</textarea>' +
      '</div>';

    return '<div class="task' + (t.done ? ' done' : '') + '" data-id="' + t.id + '" style="--cat-color:' + cat.color + '">' +
      '<div class="check" data-action="toggle">' + (t.done ? '✓' : '') + '</div>' +
      '<div class="task-body">' +
        '<div class="task-title-row">' +
          '<input class="task-title" data-action="edit" value="' + escapeHtml(t.title).replace(/"/g,'&quot;') + '" ' + (t.done ? 'readonly' : '') + ' />' +
          '<button type="button" class="star-btn' + (t.star ? ' on' : '') + '" data-action="star" title="Prioridad de hoy">' + (t.star ? '⭐' : '☆') + '</button>' +
        '</div>' +
        '<div class="task-meta">' + meta + '</div>' +
        subProgress +
        subtasksHtml +
      '</div>' +
      '<div class="task-actions"><button type="button" class="expand-btn" data-action="expand" title="Subtareas">☰</button><button type="button" class="task-del" data-action="del">×</button></div>' +
      '</div>';
  }

  function attachRowHandlers(container) {
    container.querySelectorAll('.task').forEach(function (row) {
      var id = row.dataset.id;
      var toggleBtn = row.querySelector('[data-action="toggle"]');
      if (toggleBtn) toggleBtn.addEventListener('click', function (e) { toggleDone(id, e); });
      var starBtn = row.querySelector('[data-action="star"]');
      if (starBtn) starBtn.addEventListener('click', function () { toggleStar(id); });
      var delBtn = row.querySelector('[data-action="del"]');
      if (delBtn) delBtn.addEventListener('click', function () { removeTask(id); });
      var snoozeBtn = row.querySelector('[data-action="snooze"]');
      if (snoozeBtn) snoozeBtn.addEventListener('click', function () { snoozeTask(id); });
      var editTimeBtn = row.querySelector('[data-action="edittime"]');
      if (editTimeBtn) editTimeBtn.addEventListener('click', function () { editTaskTime(id); });
      var assignTodayBtn = row.querySelector('[data-action="assigntoday"]');
      if (assignTodayBtn) assignTodayBtn.addEventListener('click', function () { assignToday(id); });
      var assignDateBtn = row.querySelector('[data-action="assigndate"]');
      if (assignDateBtn) assignDateBtn.addEventListener('click', function () { assignDate(id); });
      var notesInput = row.querySelector('[data-action="notes"]');
      if (notesInput) notesInput.addEventListener('change', function () { updateNotes(id, notesInput.value); });
      var titleInput = row.querySelector('[data-action="edit"]');
      if (titleInput) titleInput.addEventListener('change', function () { updateTitle(id, titleInput.value); });
      var expandBtn = row.querySelector('[data-action="expand"]');
      if (expandBtn) expandBtn.addEventListener('click', function () { toggleSubtasks(id); });
      var subAdd = row.querySelector('[data-action="subadd"]');
      var subInput = row.querySelector('[data-action="subinput"]');
      if (subAdd && subInput) {
        subAdd.addEventListener('click', function () { addSubtask(id, subInput.value); subInput.value = ''; });
        subInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); addSubtask(id, subInput.value); subInput.value = ''; } });
      }
      row.querySelectorAll('[data-action="subtoggle"]').forEach(function (el) {
        var subId = el.closest('[data-sub]').dataset.sub;
        el.addEventListener('click', function () { toggleSubtaskDone(id, subId); });
      });
      row.querySelectorAll('[data-action="subdel"]').forEach(function (el) {
        var subId = el.closest('[data-sub]').dataset.sub;
        el.addEventListener('click', function () { removeSubtask(id, subId); });
      });
      var remRepChips = row.querySelectorAll('[data-remrep]');
      remRepChips.forEach(function (chip) {
        chip.addEventListener('click', function () {
          remRepChips.forEach(function (c) { c.classList.remove('active'); });
          chip.classList.add('active');
          var rep = chip.dataset.remrep;
          var dateEl = row.querySelector('[data-action="reminderdate"]');
          var nWrap = row.querySelector('[data-remn-wrap]');
          if (dateEl) dateEl.style.display = (rep === 'once' || rep === 'every') ? '' : 'none';
          if (nWrap) nWrap.style.display = (rep === 'every') ? 'inline-flex' : 'none';
        });
      });
      var remAddBtn = row.querySelector('[data-action="remadd"]');
      if (remAddBtn) {
        remAddBtn.addEventListener('click', function () {
          var activeChip = row.querySelector('[data-remrep].active');
          var dateEl = row.querySelector('[data-action="reminderdate"]');
          var timeEl = row.querySelector('[data-action="remindertime"]');
          var nEl = row.querySelector('[data-action="remindern"]');
          addReminder(id, {
            repeat: activeChip ? activeChip.dataset.remrep : 'once',
            date: dateEl ? dateEl.value : null,
            time: timeEl ? timeEl.value : null,
            n: nEl ? parseInt(nEl.value, 10) : null
          });
        });
      }
      row.querySelectorAll('[data-action="remdel"]').forEach(function (el) {
        var remId = el.closest('[data-rem]').dataset.rem;
        el.addEventListener('click', function () { removeReminder(id, remId); });
      });
    });
  }

  function renderHoy() {
    var overdue = tasks.filter(function (t) { return !t.done && t.date && t.date < todayStr && inScope(t); });
    var hoyAll = tasks.filter(function (t) { return t.date === todayStr && inScope(t); });
    var mit = hoyAll.filter(function (t) { return t.star; });
    var rest = hoyAll.filter(function (t) { return !t.star; })
      .sort(function (a, b) {
        if (a.done !== b.done) return a.done ? 1 : -1;
        return (a.time || '99:99').localeCompare(b.time || '99:99');
      });
    if (prefs.hideDoneHoy) rest = rest.filter(function (t) { return !t.done; });

    var overdueBox = document.getElementById('hoyOverdue');
    if (overdue.length) {
      overdueBox.innerHTML = '<div class="section-label" style="color:var(--bad)">⚠️ Atrasadas</div><div class="task-list">' +
        overdue.map(function (t) { return taskRow(t); }).join('') + '</div>';
    } else { overdueBox.innerHTML = ''; }

    var mitRow = document.getElementById('mitRow');
    var slots = [];
    for (var i = 0; i < 3; i++) slots.push(mit[i] || null);
    mitRow.innerHTML = slots.map(function (t) {
      if (!t) return '<div class="mit-empty">⭐ Marcá una tarea de hoy con la estrella para que aparezca acá</div>';
      return '<div class="mit-card' + (t.done ? ' done' : '') + '" data-id="' + t.id + '">' +
        '<div style="display:flex;align-items:flex-start;gap:8px;">' +
        '<div class="check" data-action="toggle">' + (t.done ? '✓' : '') + '</div>' +
        '<div style="flex:1"><div class="task-title" style="font-weight:700;background:none;border:none;pointer-events:none;">' + escapeHtml(t.title) + '</div>' +
        '<div class="task-meta"><span class="chip cat" style="--cat-color:' + catInfo(t.category).color + '">' + catInfo(t.category).icon + ' ' + catInfo(t.category).label + '</span>' + (t.time ? '<span class="chip time">⏰ ' + t.time + '</span>' : '') + '</div></div>' +
        '<button type="button" class="star-btn on" data-action="star">⭐</button>' +
        '</div></div>';
    }).join('');
    mitRow.querySelectorAll('.mit-card').forEach(function (card) {
      var id = card.dataset.id;
      card.querySelector('[data-action="toggle"]').addEventListener('click', function (e) { toggleDone(id, e); });
      card.querySelector('[data-action="star"]').addEventListener('click', function () { toggleStar(id); });
    });

    var list = document.getElementById('hoyList');
    list.innerHTML = rest.length ? rest.map(function (t) { return taskRow(t); }).join('') : '<div class="empty">No tenés más tareas para hoy. ¡Buen ritmo! 🎉</div>';
    attachRowHandlers(overdueBox);
    attachRowHandlers(list);

    document.getElementById('cntHoy').textContent = hoyAll.filter(function (t) { return !t.done; }).length;

    var doneToday = hoyAll.filter(function (t) { return t.done; }).length;
    var pct = hoyAll.length ? Math.round(doneToday / hoyAll.length * 100) : 0;
    var circumference = 100.53;
    document.getElementById('ringFill').style.strokeDashoffset = circumference - (circumference * pct / 100);
    document.getElementById('ringPct').textContent = pct + '%';
  }

  function startOfWeek(d) {
    var day = (d.getDay() + 6) % 7;
    var res = new Date(d);
    res.setDate(d.getDate() - day);
    res.setHours(0,0,0,0);
    return res;
  }
  function renderSemana() {
    var grid = document.getElementById('weekGrid');
    var monday = startOfWeek(new Date());
    var html = '';
    for (var i = 0; i < 7; i++) {
      var d = new Date(monday);
      d.setDate(monday.getDate() + i);
      var iso = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      var isToday = iso === todayStr;
      var dayTasks = tasks.filter(function (t) { return t.date === iso && inScope(t); })
        .sort(function (a, b) { return (a.time || '99:99').localeCompare(b.time || '99:99'); });
      html += '<div class="day-col' + (isToday ? ' is-today' : '') + '">' +
        '<div class="day-head"><span class="day-name">' + fmtDay(d) + '</span><span class="day-num">' + d.getDate() + '</span></div>' +
        '<div class="day-tasks">' + (dayTasks.length ? dayTasks.map(function (t) {
          return '<div class="mini-task' + (t.done ? ' done' : '') + '" data-id="' + t.id + '" style="--cat-color:' + catInfo(t.category).color + '">' +
            (t.time ? '<span class="mini-time">' + t.time + '</span>' : '') +
            '<span>' + escapeHtml(t.title) + '</span></div>';
        }).join('') : '<div class="mini-empty">—</div>') + '</div></div>';
    }
    grid.innerHTML = html;
    grid.querySelectorAll('.mini-task').forEach(function (el) {
      el.addEventListener('click', function (e) { toggleDone(el.dataset.id, e); });
    });
  }

  function collapseSeriesForList(list) {
    // Las tareas periódicas se generan como una fila por día (para que Semana/Mes muestren
    // cada ocurrencia). Acá, en la pestaña Tareas, se muestran como una sola fila editable:
    // la próxima ocurrencia pendiente de cada serie, no las 60 futuras.
    var earliestPendingBySeries = {};
    list.forEach(function (t) {
      if (t.seriesId && !t.done) {
        var cur = earliestPendingBySeries[t.seriesId];
        if (!cur || (t.date || '9999') < (cur.date || '9999')) earliestPendingBySeries[t.seriesId] = t;
      }
    });
    return list.filter(function (t) {
      if (t.seriesId && !t.done) return earliestPendingBySeries[t.seriesId].id === t.id;
      return true;
    });
  }
  function renderTareas() {
    var filtered = tasks.filter(inScope);
    if (currentFilter === 'pendientes') filtered = filtered.filter(function (t) { return !t.done; });
    if (currentFilter === 'hechas') filtered = filtered.filter(function (t) { return t.done; });
    if (tareasSearchQuery) filtered = filtered.filter(function (t) { return t.title.toLowerCase().indexOf(tareasSearchQuery) !== -1; });
    filtered = collapseSeriesForList(filtered);
    filtered.sort(function (a, b) {
      return (a.date || '9999').localeCompare(b.date || '9999') || (a.time||'99:99').localeCompare(b.time||'99:99');
    });

    var list = document.getElementById('tareasList');
    list.innerHTML = filtered.length ? filtered.map(function (t) { return taskRow(t); }).join('') : '<div class="empty">No hay tareas en este filtro.</div>';
    attachRowHandlers(list);
    document.getElementById('cntTareas').textContent = tasks.filter(function (t) { return !t.done && inScope(t); }).length;
  }

  /* ---------- inbox ---------- */
  function renderInbox() {
    var items = tasks.filter(function (t) { return inScope(t) && !t.date && !t.done; })
      .sort(function (a, b) { return (a.createdAt || '').localeCompare(b.createdAt || ''); });
    var list = document.getElementById('inboxList');
    list.innerHTML = items.length ? items.map(function (t) { return taskRow(t); }).join('') : '<div class="empty">Tu inbox está vacío. Usá la captura rápida de arriba para tirar ideas sin pensar en fecha.</div>';
    attachRowHandlers(list);
    document.getElementById('cntInbox').textContent = items.length;
  }

  /* ---------- focus mode / pomodoro ---------- */
  var focusTaskId = null;
  var pomodoro = { seconds: 25 * 60, total: 25 * 60, running: false, mode: 'focus', timer: null };

  function pendingTasksForFocus() {
    return tasks.filter(function (t) { return !t.done && inScope(t); });
  }
  function pickFocusTask() {
    var pending = pendingTasksForFocus();
    if (!pending.length) return null;
    var starred = pending.filter(function (t) { return t.star; });
    if (starred.length) return starred[0];
    var today = pending.filter(function (t) { return t.date === todayStr; }).sort(function (a,b){ return (a.time||'99:99').localeCompare(b.time||'99:99'); });
    var urgentToday = today.filter(function (t) { return t.priority === 'alta'; });
    if (urgentToday.length) return urgentToday[0];
    if (today.length) return today[0];
    var overdue = pending.filter(function (t) { return t.date && t.date < todayStr; });
    if (overdue.length) return overdue[0];
    return pending[0];
  }
  function fmtTime(sec) {
    var m = Math.floor(sec / 60), s = sec % 60;
    return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }
  function renderFocus() {
    clearInterval(pomodoro.timer);
    var wrap = document.getElementById('focusWrap');
    var pending = pendingTasksForFocus();
    if (!focusTaskId || !pending.find(function (t) { return t.id === focusTaskId; })) {
      var picked = pickFocusTask();
      focusTaskId = picked ? picked.id : null;
    }
    if (!focusTaskId) {
      wrap.innerHTML = '<div class="focus-empty">🌿 No tenés tareas pendientes. Agregá una arriba para empezar a enfocarte.</div>';
      return;
    }
    var t = tasks.find(function (x) { return x.id === focusTaskId; });
    var cat = catInfo(t.category);
    pomodoro.total = pomodoro.mode === 'focus' ? 25 * 60 : 5 * 60;
    if (pomodoro.seconds > pomodoro.total || pomodoro.seconds === undefined) pomodoro.seconds = pomodoro.total;

    var subDone = t.subtasks.filter(function (s) { return s.done; }).length;
    var subHtml = t.subtasks.length ? '<div class="focus-sub"><div class="subtask-progress"><span>' + subDone + '/' + t.subtasks.length + ' pasos</span></div><div class="subtasks open" data-owner="' + t.id + '">' +
      t.subtasks.map(function (s) {
        return '<div class="subtask-row' + (s.done ? ' done' : '') + '" data-sub="' + s.id + '">' +
          '<div class="subtask-check" data-action="subtoggle">' + (s.done ? '✓' : '') + '</div>' +
          '<div class="subtask-title">' + escapeHtml(s.title) + '</div></div>';
      }).join('') + '</div></div>' : '';

    var otherOptions = pending.filter(function (p) { return p.id !== t.id; });

    wrap.innerHTML =
      '<div class="focus-card">' +
        '<div class="focus-eyebrow">Enfocate en</div>' +
        '<div class="focus-title">' + escapeHtml(t.title) + '</div>' +
        '<div class="focus-cat chip cat" style="--cat-color:' + cat.color + '">' + cat.icon + ' ' + cat.label + '</div>' +
        subHtml +
        '<div class="timer-ring">' +
          '<svg viewBox="0 0 100 100">' +
            '<circle class="timer-track" cx="50" cy="50" r="44"></circle>' +
            '<circle class="timer-fill" id="timerFill" cx="50" cy="50" r="44" stroke-dasharray="276.5"></circle>' +
          '</svg>' +
          '<div class="timer-center"><div class="timer-time" id="timerTime">' + fmtTime(pomodoro.seconds) + '</div><div class="timer-mode" id="timerMode">' + (pomodoro.mode === 'focus' ? 'Concentración' : 'Descanso') + '</div></div>' +
        '</div>' +
        '<div class="focus-controls">' +
          '<button type="button" class="focus-btn primary" id="pomoToggle">' + (pomodoro.running ? 'Pausar' : 'Empezar') + '</button>' +
          '<button type="button" class="focus-btn ghost" id="pomoReset">Reiniciar</button>' +
          '<button type="button" class="focus-btn complete" id="pomoComplete">✓ Completar tarea</button>' +
        '</div>' +
        (otherOptions.length ? '<div class="focus-pick">¿Preferís otra tarea?<br/><select id="focusPick"><option value="">Elegir…</option>' +
          otherOptions.map(function (o) { return '<option value="' + o.id + '">' + escapeHtml(o.title) + '</option>'; }).join('') + '</select></div>' : '') +
      '</div>';

    updateTimerRing();

    document.getElementById('pomoToggle').addEventListener('click', function () { togglePomodoro(); });
    document.getElementById('pomoReset').addEventListener('click', function () {
      pomodoro.running = false; pomodoro.seconds = pomodoro.total; clearInterval(pomodoro.timer);
      renderFocus();
    });
    document.getElementById('pomoComplete').addEventListener('click', function (e) { toggleDone(focusTaskId, e); focusTaskId = null; renderFocus(); });
    var pickEl = document.getElementById('focusPick');
    if (pickEl) pickEl.addEventListener('change', function () { if (this.value) { focusTaskId = this.value; pomodoro.seconds = pomodoro.total; pomodoro.running = false; renderFocus(); } });

    wrap.querySelectorAll('[data-action="subtoggle"]').forEach(function (el) {
      var subId = el.closest('[data-sub]').dataset.sub;
      el.addEventListener('click', function () { toggleSubtaskDone(focusTaskId, subId); renderFocus(); });
    });

    if (pomodoro.running) startTicking();
  }
  function updateTimerRing() {
    var fill = document.getElementById('timerFill');
    if (!fill) return;
    var circumference = 276.5;
    var frac = pomodoro.seconds / pomodoro.total;
    fill.style.strokeDashoffset = circumference - circumference * frac;
    var timeEl = document.getElementById('timerTime');
    if (timeEl) timeEl.textContent = fmtTime(pomodoro.seconds);
  }
  function togglePomodoro() {
    pomodoro.running = !pomodoro.running;
    var btn = document.getElementById('pomoToggle');
    if (btn) btn.textContent = pomodoro.running ? 'Pausar' : 'Empezar';
    if (pomodoro.running) startTicking(); else clearInterval(pomodoro.timer);
  }
  function startTicking() {
    clearInterval(pomodoro.timer);
    pomodoro.timer = setInterval(function () {
      pomodoro.seconds--;
      if (pomodoro.seconds <= 0) {
        chime();
        pomodoro.mode = pomodoro.mode === 'focus' ? 'descanso' : 'focus';
        pomodoro.total = pomodoro.mode === 'focus' ? 25 * 60 : 5 * 60;
        pomodoro.seconds = pomodoro.total;
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification('Mente', { body: pomodoro.mode === 'focus' ? '¡A enfocarse de nuevo!' : '¡Tomate un descanso de 5 minutos!' });
        }
        var modeEl = document.getElementById('timerMode');
        if (modeEl) modeEl.textContent = pomodoro.mode === 'focus' ? 'Concentración' : 'Descanso';
      }
      updateTimerRing();
    }, 1000);
  }

  /* ---------- day planner ---------- */
  function renderDiaPlanner() {
    var wrap = document.getElementById('diaWrap');
    var todayTasks = tasks.filter(function (t) { return t.date === todayStr && inScope(t); });
    var withTime = todayTasks.filter(function (t) { return t.time; });
    var noTime = todayTasks.filter(function (t) { return !t.time; });
    var nowHour = new Date().getHours();
    var startH = 6, endH = 23;
    var html = '';
    if (noTime.length) {
      html += '<div class="section-label">Sin hora fija</div><div class="task-list day-plan-unscheduled">' +
        noTime.map(function (t) { return taskRow(t); }).join('') + '</div>';
    }
    html += '<div class="section-label">Línea de tiempo</div><div class="day-plan">';
    for (var h = startH; h <= endH; h++) {
      var hourTasks = withTime.filter(function (t) { return parseInt(t.time.split(':')[0], 10) === h; })
        .sort(function (a, b) { return a.time.localeCompare(b.time); });
      var isNow = h === nowHour;
      html += '<div class="day-plan-row' + (isNow ? ' now' : '') + '"><div class="day-plan-hour">' + String(h).padStart(2,'0') + ':00</div><div class="day-plan-slot" data-hour="' + h + '">';
      hourTasks.forEach(function (t) {
        html += '<div class="day-plan-task' + (t.done ? ' done' : '') + '" data-id="' + t.id + '" style="--cat-color:' + catInfo(t.category).color + '">' +
          '<span class="day-plan-task-time">' + t.time + '</span><span>' + escapeHtml(t.title) + '</span></div>';
      });
      html += '<button type="button" class="day-plan-add" data-add-hour="' + h + '">+ agregar</button>';
      html += '</div></div>';
    }
    html += '</div>';
    wrap.innerHTML = html;

    attachRowHandlers(wrap);
    wrap.querySelectorAll('.day-plan-task').forEach(function (el) {
      el.addEventListener('click', function (e) { toggleDone(el.dataset.id, e); });
    });
    wrap.querySelectorAll('[data-add-hour]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var hour = btn.dataset.addHour;
        var slot = btn.closest('.day-plan-slot');
        var row = document.createElement('div');
        row.className = 'day-plan-add-input';
        row.innerHTML = '<input type="text" placeholder="¿Qué necesitás hacer a las ' + String(hour).padStart(2,'0') + ':00?" />';
        slot.insertBefore(row, btn);
        btn.style.display = 'none';
        var input = row.querySelector('input');
        input.focus();
        var committed = false;
        async function commit() {
          if (committed) return;
          committed = true;
          var val = input.value.trim();
          if (val) {
            var inserted = await dbInsertTask({
              title: val, date: todayStr, time: String(hour).padStart(2,'0') + ':00',
              priority: 'media', category: (prefs.scopeFilter === 'trabajo' ? 'trabajo' : 'personal'),
              star: false, done: false, subtasks: [], repeat: null
            });
            if (inserted) { tasks.push(inserted); addSound(); await ensureTaskReminder(inserted); }
          }
          renderAll();
        }
        input.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') { e.preventDefault(); commit(); }
          if (e.key === 'Escape') { committed = true; renderDiaPlanner(); }
        });
        input.addEventListener('blur', function () { commit(); });
      });
    });
  }

  /* ---------- month calendar ---------- */
  var mesCursor = new Date();
  var mesSelectedDate = todayStr;
  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
  function renderMes() {
    var wrap = document.getElementById('mesWrap');
    var year = mesCursor.getFullYear(), month = mesCursor.getMonth();
    var first = new Date(year, month, 1);
    var startOffset = (first.getDay() + 6) % 7;
    var daysInMonth = new Date(year, month + 1, 0).getDate();
    var monthLabel = capitalize(mesCursor.toLocaleDateString('es-MX', { month: 'long', year: 'numeric' }));
    var weekdays = ['L', 'M', 'M', 'J', 'V', 'S', 'D'];

    var html = '<div class="mes-header"><div class="mes-title">' + monthLabel + '</div>' +
      '<div class="mes-nav">' +
        '<button type="button" data-action="mesprev" aria-label="Mes anterior">‹</button>' +
        '<button type="button" class="mes-today-btn" data-action="mestoday">Hoy</button>' +
        '<button type="button" data-action="mesnext" aria-label="Mes siguiente">›</button>' +
      '</div></div>';

    html += '<div class="mes-grid">';
    weekdays.forEach(function (w) { html += '<div class="mes-weekday">' + w + '</div>'; });
    for (var i = 0; i < startOffset; i++) html += '<div class="mes-cell empty"></div>';
    for (var d = 1; d <= daysInMonth; d++) {
      var iso = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
      var count = tasks.filter(function (t) { return t.date === iso && inScope(t); }).length;
      var isToday = iso === todayStr;
      var isSelected = iso === mesSelectedDate;
      var dots = '';
      for (var k = 0; k < Math.min(count, 4); k++) dots += '<span class="mes-dot"></span>';
      html += '<div class="mes-cell' + (isToday ? ' is-today' : '') + (isSelected ? ' is-selected' : '') + '" data-date="' + iso + '">' +
        '<div class="mes-daynum">' + d + '</div>' +
        (count ? '<div class="mes-dots">' + dots + '</div>' : '') +
        '</div>';
    }
    html += '</div>';

    var selTasks = tasks.filter(function (t) { return t.date === mesSelectedDate && inScope(t); })
      .sort(function (a, b) { return (a.time || '99:99').localeCompare(b.time || '99:99'); });
    var selLabel = capitalize(new Date(mesSelectedDate + 'T00:00:00').toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long' }));

    html += '<div class="mes-day-panel"><div class="mes-day-panel-title">' + selLabel + '</div>' +
      '<div class="task-list" id="mesDayList">' +
      (selTasks.length ? selTasks.map(function (t) { return taskRow(t); }).join('') : '<div class="empty">No hay tareas este día.</div>') +
      '</div>' +
      '<div class="mes-quick-add"><input type="text" id="mesQuickInput" placeholder="Agregar tarea para este día…" /></div>' +
      '</div>';

    wrap.innerHTML = html;

    wrap.querySelector('[data-action="mesprev"]').addEventListener('click', function () { mesCursor.setMonth(mesCursor.getMonth() - 1); renderMes(); });
    wrap.querySelector('[data-action="mesnext"]').addEventListener('click', function () { mesCursor.setMonth(mesCursor.getMonth() + 1); renderMes(); });
    wrap.querySelector('[data-action="mestoday"]').addEventListener('click', function () { mesCursor = new Date(); mesSelectedDate = todayStr; renderMes(); });
    wrap.querySelectorAll('.mes-cell:not(.empty)').forEach(function (cell) {
      cell.addEventListener('click', function () { mesSelectedDate = cell.dataset.date; renderMes(); });
    });
    attachRowHandlers(wrap.querySelector('#mesDayList'));

    var quickInput = document.getElementById('mesQuickInput');
    var quickCommitted = false;
    async function commitMesQuick() {
      if (quickCommitted) return;
      quickCommitted = true;
      var val = quickInput.value.trim();
      if (val) {
        var inserted = await dbInsertTask({
          title: val, date: mesSelectedDate, time: null, priority: 'media',
          category: (prefs.scopeFilter === 'trabajo' ? 'trabajo' : 'personal'),
          star: false, done: false, subtasks: [], repeat: null
        });
        if (inserted) { tasks.push(inserted); addSound(); }
      }
      renderAll();
    }
    quickInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); commitMesQuick(); }
    });
    quickInput.addEventListener('blur', function () { commitMesQuick(); });
  }

  /* ---------- estadísticas ---------- */
  function computeBestStreak() {
    var set = {};
    streakDays.forEach(function (d) { set[d] = true; });
    var dates = Object.keys(set).sort();
    var best = 0, run = 0, prev = null;
    dates.forEach(function (d) {
      if (prev) {
        var diffDays = Math.round((new Date(d + 'T00:00:00') - new Date(prev + 'T00:00:00')) / 86400000);
        run = diffDays === 1 ? run + 1 : 1;
      } else {
        run = 1;
      }
      if (run > best) best = run;
      prev = d;
    });
    return best;
  }
  function statCard(label, value, sub) {
    return '<div class="stat-card"><div class="stat-label">' + label + '</div>' +
      '<div class="stat-value">' + value + '</div><div class="stat-sub">' + sub + '</div></div>';
  }
  function pct(done, total) { return total ? Math.round(done / total * 100) : 0; }
  function renderStats() {
    var wrap = document.getElementById('statsWrap');
    var scoped = tasks.filter(inScope);
    var hoyAll = scoped.filter(function (t) { return t.date === todayStr; });
    var hoyDone = hoyAll.filter(function (t) { return t.done; }).length;

    var monday = startOfWeek(new Date());
    var weekDates = [];
    for (var i = 0; i < 7; i++) { var d = new Date(monday); d.setDate(monday.getDate() + i); weekDates.push(isoFromDate(d)); }
    var weekTasks = scoped.filter(function (t) { return weekDates.indexOf(t.date) !== -1; });
    var weekDone = weekTasks.filter(function (t) { return t.done; }).length;

    var perDay = weekDates.map(function (iso) {
      var dayTasks = scoped.filter(function (t) { return t.date === iso; });
      return { iso: iso, done: dayTasks.filter(function (t) { return t.done; }).length, total: dayTasks.length };
    });
    var maxDone = Math.max.apply(null, perDay.map(function (d) { return d.done; }).concat([1]));

    var byCat = {};
    CATS.forEach(function (c) { byCat[c.id] = { done: 0, total: 0 }; });
    weekTasks.forEach(function (t) {
      if (byCat[t.category]) { byCat[t.category].total++; if (t.done) byCat[t.category].done++; }
    });

    var html = '<div class="stats-grid">' +
      statCard('Hoy', hoyDone + ' / ' + hoyAll.length, pct(hoyDone, hoyAll.length) + '% completado') +
      statCard('Esta semana', weekDone + ' / ' + weekTasks.length, pct(weekDone, weekTasks.length) + '% completado') +
      statCard('Racha', currentStreak() + (currentStreak() === 1 ? ' día' : ' días'), 'Mejor racha: ' + computeBestStreak() + ' días') +
      '</div>';

    html += '<div class="section-label">Últimos 7 días</div>';
    html += '<div class="stats-bars">' + perDay.map(function (d) {
      var date = new Date(d.iso + 'T00:00:00');
      var h = d.total ? Math.max(6, Math.round(d.done / maxDone * 64)) : 4;
      return '<div class="stats-bar-col"><div class="stats-bar" style="height:' + h + 'px" title="' + d.done + '/' + d.total + '"></div>' +
        '<div class="stats-bar-label">' + fmtDay(date) + '</div></div>';
    }).join('') + '</div>';

    html += '<div class="section-label">Por categoría esta semana</div>';
    html += '<div class="stats-cat-list">' + CATS.map(function (c) {
      var b = byCat[c.id];
      return '<div class="stats-cat-row"><span>' + c.icon + ' ' + c.label + '</span><span>' + b.done + '/' + b.total + ' (' + pct(b.done, b.total) + '%)</span></div>';
    }).join('') + '</div>';

    wrap.innerHTML = html;
  }

  function renderAll() {
    renderHoy();
    renderSemana();
    renderTareas();
    document.getElementById('cntInbox').textContent = tasks.filter(function (t) { return inScope(t) && !t.date && !t.done; }).length;
    if (document.getElementById('view-inbox').classList.contains('active')) renderInbox();
    if (document.getElementById('view-enfoque').classList.contains('active')) renderFocus();
    if (document.getElementById('view-dia').classList.contains('active')) renderDiaPlanner();
    if (document.getElementById('view-mes').classList.contains('active')) renderMes();
    if (document.getElementById('view-stats').classList.contains('active')) renderStats();
  }

  /* ---------- auth ---------- */
  var authScreen = document.getElementById('authScreen');
  var appEl = document.getElementById('app');
  var authError = document.getElementById('authError');
  function showAuthMessage(msg, ok) {
    authError.textContent = msg;
    authError.style.color = ok ? 'var(--ink)' : 'var(--bad)';
  }
  function readAuthFields() {
    var email = document.getElementById('authEmail').value.trim();
    var password = document.getElementById('authPassword').value;
    if (!email || !password) {
      showAuthMessage('Escribe tu email y tu contraseña antes de continuar.', false);
      return null;
    }
    return { email: email, password: password };
  }
  document.getElementById('authSignIn').addEventListener('click', async function () {
    var creds = readAuthFields();
    if (!creds) return;
    var res = await sb.auth.signInWithPassword(creds);
    if (res.error) showAuthMessage(res.error.message, false);
  });
  document.getElementById('authSignUp').addEventListener('click', async function () {
    var creds = readAuthFields();
    if (!creds) return;
    var res = await sb.auth.signUp(creds);
    if (res.error) showAuthMessage(res.error.message, false);
    else showAuthMessage('Cuenta creada. Si tu proyecto pide confirmar el email, revisa tu bandeja de entrada y después inicia sesión.', true);
  });
  document.getElementById('signOutBtn').addEventListener('click', async function () {
    await sb.auth.signOut();
  });

  async function startApp(userId) {
    currentUserId = userId;
    authScreen.style.display = 'none';
    appEl.classList.add('ready');
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function (e) { console.error('SW register failed', e); });
    }
    updateStreakUI();
    await loadTasks();
  }
  function stopApp() {
    currentUserId = null;
    tasks = [];
    appEl.classList.remove('ready');
    authScreen.style.display = 'flex';
  }

  sb.auth.onAuthStateChange(function (event, session) {
    if (session) startApp(session.user.id); else stopApp();
  });
  sb.auth.getSession().then(function (res) {
    if (res.data.session) startApp(res.data.session.user.id);
  });
})();
</script>
