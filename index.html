  .task-list { display: flex; flex-direction: column; gap: 8px; }
  .task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 14px 16px;
    position: relative;
    box-shadow: var(--shadow);
    animation: settle-in var(--dur-2) var(--ease) both;
    transition: opacity .2s, border-color .2s var(--ease), transform .16s var(--ease), box-shadow .2s var(--ease);
  }
  .task:hover { border-color: var(--line-strong); transform: translateY(-1px); box-shadow: var(--shadow-hover); }
  .task:active { transform: scale(0.99); }
  .task.done { opacity: 0.55; }
  .task.done .task-title { text-decoration: line-through; color: var(--muted); }
  .check {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid var(--faint);
    background: var(--surface);
    flex: none;
    margin-top: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 13px; font-weight: 700;
    transition: background .18s var(--ease), border-color .18s var(--ease), transform .12s var(--ease);
    touch-action: manipulation;
    position: relative;
  }
  .check:hover { border-color: var(--accent); }
  .check:active { transform: scale(0.88); }
  .task.done .check { background: var(--accent); border-color: var(--accent); animation: stamp .4s var(--ease-stamp); }
  .mit-card.done .check { background: var(--accent); border-color: var(--accent); animation: stamp .4s var(--ease-stamp); }
  .check.locked { cursor: not-allowed; border-style: dashed; color: var(--faint); font-size: 10px; }
  .check.locked:hover { border-color: var(--faint); }
  .check.locked:active { transform: none; }

  .confirm-status {
    display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: var(--r-pill); margin-top: 6px;
  }
  .confirm-status.pending { color: var(--accent2); background: rgba(255,149,0,0.13); }
  .confirm-status.done { color: var(--good); background: var(--good-soft); }
  .confirm-send-btn {
    background: var(--accent-soft); color: var(--accent); border: none; border-radius: var(--r-pill);
    padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 8px;
    display: inline-flex; align-items: center; gap: 6px; touch-action: manipulation;
    transition: opacity .15s, transform .12s var(--ease);
  }
  .confirm-send-btn:hover { opacity: 0.85; }
  .confirm-send-btn:active { transform: scale(0.95); }

  .task-body { flex: 1; min-width: 0; }
  .task-title-row { display: flex; align-items: center; gap: 6px; }
  .task-title {
    font-size: 15px; font-weight: 500; letter-spacing: -0.005em;
    background: none; border: none; color: var(--ink);
    font-family: inherit; padding: 2px 0; width: 100%;
    border-bottom: 1px solid transparent;
  }
  .task-title:focus { outline: none; border-bottom-color: var(--accent); }
  .star-btn {
    background: none; border: none; cursor: pointer; font-size: 15px;
    color: var(--faint); flex: none; padding: 2px 4px;
    touch-action: manipulation; transition: transform .15s var(--ease-stamp), color .15s;
  }
  .star-btn:active { transform: scale(0.8); }
  .star-btn.on { color: var(--accent2); transform: scale(1.05); }
  .task-meta { display: flex; gap: 10px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
  .chip {
    font-size: 11px; padding: 3px 8px; border-radius: var(--r-pill);
    font-weight: 600; letter-spacing: 0; text-transform: none; font-variant-numeric: tabular-nums;
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface-sunken); border: none; color: var(--muted);
  }
  .chip.cat { color: var(--muted); }
  .chip.time { color: var(--muted); }
  .chip.overdue { color: var(--bad); font-weight: 700; background: var(--bad-soft); }
  .chip.urgent { color: var(--bad); font-weight: 700; background: var(--bad-soft); }
  .snooze-btn {
    background: none; border: none; color: var(--accent);
    border-radius: 0; font-size: 11px; font-weight: 600; text-transform: none; letter-spacing: 0;
    padding: 0; cursor: pointer; touch-action: manipulation; text-decoration: none;
  }
  .snooze-btn:hover { opacity: 0.7; }

  .subtask-progress {
    font-size: 11.5px; color: var(--muted); font-weight: 600;
    display: flex; align-items: center; gap: 6px; margin-top: 6px;
  }
  .subtask-bar { width: 60px; height: 4px; border-radius: var(--r-pill); background: var(--surface-sunken); overflow: hidden; }
  .subtask-bar-fill { height: 100%; background: var(--accent); border-radius: var(--r-pill); transition: width .3s var(--ease); }
  .subtasks { margin-top: 10px; display: none; flex-direction: column; gap: 6px; padding-left: 2px; }
  .subtasks.open { display: flex; }
  .subtask-row { display: flex; align-items: center; gap: 8px; }
  .subtask-check {
    width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--faint);
    background: var(--surface); cursor: pointer; flex: none;
    display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff;
    touch-action: manipulation;
    transition: background .18s var(--ease), border-color .18s var(--ease), transform .12s var(--ease);
  }
  .subtask-check:active { transform: scale(0.85); }
  .subtask-row.done .subtask-check { background: var(--accent); border-color: var(--accent); animation: stamp .32s var(--ease-stamp); }
  .subtask-row.done .subtask-title { text-decoration: line-through; color: var(--faint); }
  .subtask-title { font-size: 13.5px; flex: 1; }
  .subtask-del { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 14px; padding: 2px 6px; }
  .subtask-add { display: flex; gap: 6px; margin-top: 2px; }
  .subtask-add input {
    flex: 1; font-size: 13px; padding: 7px 10px; border-radius: var(--r-sm);
    border: 1px solid var(--line); background: var(--surface-sunken); color: var(--ink); font-family: inherit;
  }
  .subtask-add button {
    background: var(--surface-sunken); color: var(--ink); border: 1px solid var(--line); border-radius: var(--r-sm);
    padding: 7px 12px; font-size: 12px; font-weight: 600; cursor: pointer; transition: transform .12s var(--ease);
  }
  .subtask-add button:active { transform: scale(0.94); }

  .reminder-list { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .reminder-row { display: flex; align-items: center; gap: 8px; }
  .reminder-del { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 14px; padding: 2px 6px; }
  .reminder-add { margin-top: 8px; }
  .reminder-add .repeat-chips { margin-bottom: 8px; }
  .reminder-add-fields { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .reminder-add input[type="date"], .reminder-add input[type="time"], .reminder-add input[type="number"] {
    font-size: 12.5px; padding: 7px 8px; border-radius: var(--r-sm);
    border: 1px solid var(--line); background: var(--surface-sunken); color: var(--ink); font-family: inherit;
  }
  .reminder-add input[type="number"] { width: 56px; }
  .reminder-add button {
    background: var(--surface-sunken); color: var(--ink); border: 1px solid var(--line); border-radius: var(--r-sm);
    padding: 7px 12px; font-size: 12px; font-weight: 600; cursor: pointer; transition: transform .12s var(--ease);
  }
  .reminder-add button:active { transform: scale(0.94); }
  .detail-label { font-size: 11px; text-transform: none; letter-spacing: 0; color: var(--muted); font-weight: 600; margin: 12px 0 6px; }
  .detail-label:first-child { margin-top: 0; }
  .notes-input {
    width: 100%; font-size: 13.5px; font-family: inherit; color: var(--ink);
    background: var(--surface-sunken); border: 1px solid var(--line); border-radius: var(--r-sm);
    padding: 9px 11px; resize: vertical; min-height: 44px; transition: border-color .15s var(--ease);
  }
  .notes-input:focus { outline: none; border-color: var(--accent); }
  .detail-label-hint { text-transform: none; letter-spacing: 0; font-weight: 500; color: var(--muted); }

  .photo-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .photo-thumb {
    position: relative; width: 64px; height: 64px; border-radius: var(--r-sm); overflow: hidden;
    border: 1px solid var(--line); flex: none;
    animation: settle-in var(--dur-2) var(--ease) both;
  }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-del {
    position: absolute; top: 3px; right: 3px; width: 18px; height: 18px; border-radius: 50%;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); color: #fff; border: none; cursor: pointer;
    font-size: 12px; line-height: 1; display: flex; align-items: center; justify-content: center;
    touch-action: manipulation; transition: background .15s var(--ease), transform .12s var(--ease);
  }
  .photo-del:hover { background: rgba(0,0,0,0.75); }
  .photo-del:active { transform: scale(0.85); }
  .photo-add-btn {
    width: 64px; height: 64px; border-radius: var(--r-sm); border: 1.5px dashed var(--line-strong);
    color: var(--faint); font-size: 12px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; text-align: center;
    cursor: pointer; flex: none; touch-action: manipulation;
    transition: border-color .15s var(--ease), color .15s var(--ease);
  }
  .photo-add-btn:hover { border-color: var(--accent); color: var(--accent); }

  .task-actions { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: none; }
  .expand-btn, .task-del {
    background: none; border: none; color: var(--faint);
    cursor: pointer; font-size: 15px; padding: 6px 7px; border-radius: var(--r-sm);
    min-width: 30px; min-height: 30px; touch-action: manipulation;
    transition: color .15s, background .15s, transform .12s var(--ease);
  }
  .expand-btn:active, .task-del:active { transform: scale(0.9); }
  .task-del:hover { color: var(--bad); background: var(--bad-soft); }
  .expand-btn:hover { color: var(--accent); background: var(--surface-sunken); }

  .empty {
    color: var(--faint);
    font-size: 13.5px;
    padding: 26px 4px;
    text-align: center;
    border: 1.5px dashed var(--line-strong);
    border-radius: var(--r-md);
    animation: settle-in var(--dur-2) var(--ease) both;
  }

  /* ---------- week grid ---------- */
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  @media (max-width: 860px) and (min-width: 601px) {
    .week-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
  }
  @media (max-width: 600px) {
    .week-grid { grid-template-columns: 1fr; }
    .day-col { min-height: 0; flex-direction: row; align-items: flex-start; flex-wrap: wrap; padding: 12px; }
    .day-head { flex-direction: column; align-items: flex-start; gap: 0; flex: none; width: 54px; }
    .day-tasks { flex: 1; min-width: 0; }
  }
  .day-col {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md);
    padding: 12px; min-height: 130px; display: flex; flex-direction: column; gap: 8px;
    box-shadow: var(--shadow);
    animation: cascade-in var(--dur-3) var(--ease) both;
    transition: border-color .2s var(--ease), transform .16s var(--ease), box-shadow .2s var(--ease);
  }
  .day-col:hover { border-color: var(--line-strong); transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .week-grid .day-col:nth-child(1) { animation-delay: 0ms; }
  .week-grid .day-col:nth-child(2) { animation-delay: 40ms; }
  .week-grid .day-col:nth-child(3) { animation-delay: 80ms; }
  .week-grid .day-col:nth-child(4) { animation-delay: 120ms; }
  .week-grid .day-col:nth-child(5) { animation-delay: 160ms; }
  .week-grid .day-col:nth-child(6) { animation-delay: 200ms; }
  .week-grid .day-col:nth-child(7) { animation-delay: 240ms; }
  .day-col.is-today { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 1px var(--accent) inset, var(--shadow); }
  .day-head { display: flex; justify-content: space-between; align-items: baseline; }
  .day-name { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 700; }
  .day-col.is-today .day-name { color: var(--accent); }
  .day-num { font-family: var(--font-mono); font-size: 14px; font-variant-numeric: tabular-nums; color: var(--faint); font-weight: 600; }
  .day-col.is-today .day-num { color: var(--accent); }
  .day-tasks { display: flex; flex-direction: column; gap: 5px; }
  .mini-task {
    font-size: 12.5px; padding: 7px 9px; border-radius: var(--r-sm);
    background: var(--surface-sunken); border-left: 3px solid var(--cat-color, var(--accent));
    display: flex; gap: 6px; align-items: flex-start; cursor: pointer; min-height: 32px;
    touch-action: manipulation; transition: transform .12s var(--ease), background .15s;
  }
  .mini-task:active { transform: scale(0.97); }
  .day-col.is-today .mini-task { background: var(--surface-sunken); }
  .mini-task.done { opacity: 0.5; text-decoration: line-through; }
  .mini-time { color: var(--muted); font-weight: 600; font-variant-numeric: tabular-nums; flex: none; }
  .mini-empty { font-size: 12px; color: var(--faint); padding: 4px 2px; }

  /* ---------- stats ---------- */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 8px; }
  @media (max-width: 640px) { .stats-grid { grid-template-columns: 1fr; } }
  .stat-card {
    border: 1px solid var(--line); border-radius: var(--r-md); padding: 20px;
    box-shadow: var(--shadow); background: var(--surface);
    animation: cascade-in var(--dur-3) var(--ease) both;
    transition: border-color .2s var(--ease), transform .16s var(--ease), box-shadow .2s var(--ease);
  }
  .stat-card:hover { border-color: var(--line-strong); transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .stats-grid .stat-card:nth-child(1) { animation-delay: 0ms; }
  .stats-grid .stat-card:nth-child(2) { animation-delay: 60ms; }
  .stats-grid .stat-card:nth-child(3) { animation-delay: 120ms; }
  .stat-label { font-size: 12px; text-transform: none; letter-spacing: 0; color: var(--muted); font-weight: 600; margin-bottom: 10px; }
  .stat-value { font-family: var(--font-display); font-size: 32px; font-weight: 700; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; color: var(--accent); }
  .stat-sub { font-size: 12.5px; color: var(--muted); margin-top: 6px; }
  .stats-bars { display: flex; align-items: flex-end; gap: 14px; padding: 20px 4px 8px; border-bottom: 1px solid var(--line); }
  .stats-bar-col { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
  .stats-bar { width: 100%; max-width: 28px; background: var(--accent); border-radius: 6px 6px 2px 2px; transition: height .5s var(--ease); }
  .stats-bar-label { font-size: 10.5px; text-transform: uppercase; color: var(--faint); font-weight: 600; }
  .stats-cat-list { display: flex; flex-direction: column; }
  .stats-cat-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0; border-bottom: 1px solid var(--line); font-size: 14px;
  }
  .stats-cat-row:last-child { border-bottom: none; }
  .stats-cat-row span:first-child { font-weight: 500; }
  .stats-cat-row span:last-child { color: var(--muted); font-variant-numeric: tabular-nums; }

  /* ---------- month calendar ---------- */
  .mes-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .mes-title { font-family: var(--font-display); font-size: 19px; font-weight: 700; letter-spacing: -0.015em; }
  .mes-nav { display: flex; align-items: center; gap: 14px; }
  .mes-nav button {
    background: var(--surface-sunken); border: none; color: var(--ink); font-size: 16px;
    width: 30px; height: 30px; border-radius: 50%;
    cursor: pointer; padding: 0; line-height: 1; touch-action: manipulation;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, transform .12s var(--ease);
  }
  .mes-nav button:hover { background: var(--accent-soft); color: var(--accent); }
  .mes-nav button:active { transform: scale(0.9); }
  .mes-today-btn {
    font-size: 12.5px; text-decoration: none;
    color: var(--accent); font-weight: 600;
  }
  .mes-today-btn:hover { opacity: 0.75; }
  .mes-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border-top: 1px solid var(--line); border-left: 1px solid var(--line);
    border-radius: var(--r-md); overflow: hidden;
    animation: settle-in var(--dur-2) var(--ease) both;
    background: var(--surface); box-shadow: var(--shadow);
  }
  .mes-weekday {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--faint); font-weight: 700;
    text-align: center; padding: 8px 0; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line);
  }
  .mes-cell {
    min-height: 80px; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line);
    padding: 8px; cursor: pointer; display: flex; flex-direction: column; gap: 6px;
    touch-action: manipulation; transition: background .15s var(--ease);
  }
  .mes-cell.empty { cursor: default; }
  .mes-cell:hover:not(.empty) { background: var(--surface-sunken); }
  .mes-cell.is-selected { background: var(--accent-soft); }
  .mes-daynum { font-family: var(--font-mono); font-size: 13px; color: var(--ink); font-variant-numeric: tabular-nums; }
  .mes-cell.is-today .mes-daynum {
    font-weight: 700; color: #fff; background: var(--accent); text-decoration: none;
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 50%;
  }
  .mes-cell.empty .mes-daynum { color: var(--faint); }
  .mes-dots { display: flex; gap: 3px; flex-wrap: wrap; }
  .mes-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex: none; }
  .mes-day-panel { margin-top: 32px; }
  .mes-day-panel-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.01em; }
  .mes-quick-add {
    margin-top: 14px; display: flex; gap: 8px;
  }
  .mes-quick-add input {
    flex: 1; font-size: 14px; padding: 11px 14px; border-radius: var(--r-sm);
    border: 1px solid var(--line); background: var(--surface-sunken); color: var(--ink); font-family: inherit;
    transition: border-color .15s var(--ease);
  }
  .mes-quick-add input:focus { outline: none; border-color: var(--accent); }
  @media (max-width: 640px) {
    .mes-cell { min-height: 52px; padding: 6px 4px; gap: 3px; }
    .mes-daynum { font-size: 11.5px; }
    .mes-weekday { font-size: 9.5px; padding: 6px 0; }
  }

  /* ---------- filters ---------- */
  .filters { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; background: var(--surface-sunken); border-radius: var(--r-md); padding: 3px; width: fit-content; }
  .filter-btn {
    border: none; background: none; color: var(--muted);
    padding: 8px 16px; border-radius: calc(var(--r-md) - 3px); font-size: 13px; font-weight: 500; letter-spacing: 0;
    cursor: pointer; min-height: 0; touch-action: manipulation;
    border-bottom: none;
    transition: color .15s, background .18s var(--ease), transform .12s var(--ease), box-shadow .18s var(--ease);
  }
  .filter-btn:hover { color: var(--ink); }
  .filter-btn:active { transform: scale(0.96); }
  .filter-btn.active { background: var(--surface); box-shadow: var(--shadow); color: var(--ink); font-weight: 600; }

  /* ---------- day planner ---------- */
  .day-plan { display: flex; flex-direction: column; border-top: 1px solid var(--line); border-radius: 0; overflow: hidden; }
  .day-plan-row { display: flex; gap: 12px; border-bottom: 1px solid var(--line); padding: 8px 6px; min-height: 50px; }
  .day-plan-row.now { background: var(--accent-soft); border-radius: var(--r-sm); }
  .day-plan-hour {
    width: 52px; flex: none; font-size: 12px; font-weight: 700; color: var(--faint);
    font-variant-numeric: tabular-nums; padding-top: 6px;
  }
  .day-plan-row.now .day-plan-hour { color: var(--accent); }
  .day-plan-slot { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
  .day-plan-task {
    border-left: 3px solid var(--cat-color, var(--accent));
    background: var(--surface-sunken); border-radius: var(--r-sm);
    padding: 8px 11px; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 8px; touch-action: manipulation;
    transition: transform .12s var(--ease);
  }
  .day-plan-task:active { transform: scale(0.98); }
  .day-plan-row.now .day-plan-task { background: var(--surface); }
  .day-plan-task.done { opacity: 0.5; text-decoration: line-through; }
  .day-plan-task-time { color: var(--muted); font-weight: 600; font-variant-numeric: tabular-nums; flex: none; }
  .day-plan-add {
    background: none; border: 1.5px dashed var(--line-strong); color: var(--faint);
    border-radius: var(--r-sm); padding: 7px 11px; font-size: 12px; font-weight: 600;
    cursor: pointer; text-align: left; touch-action: manipulation; min-height: 34px;
    transition: border-color .15s, color .15s;
  }
  .day-plan-add:hover { border-color: var(--accent); color: var(--accent); }
  .day-plan-add-input { display: flex; gap: 6px; }
  .day-plan-add-input input {
    flex: 1; font-size: 13px; padding: 7px 10px; border-radius: var(--r-sm);
    border: 1px solid var(--line); background: var(--surface-sunken); color: var(--ink); font-family: inherit;
  }
  .day-plan-unscheduled { margin-bottom: 18px; }

  /* ---------- focus mode ---------- */
  .focus-wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 20px 0 20px; }
  .focus-card {
    width: 100%; max-width: 460px;
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg); padding: 44px 36px; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    animation: settle-in var(--dur-3) var(--ease) both;
  }
  .focus-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 700; }
  .focus-title { font-family: var(--font-display); font-size: 24px; font-weight: 700; text-wrap: balance; letter-spacing: -0.02em; }
  .focus-cat { font-size: 12px; font-weight: 600; }
  .timer-ring { position: relative; width: 200px; height: 200px; margin: 8px 0; }
  .timer-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
  .timer-track { fill: none; stroke: var(--surface-sunken); stroke-width: 6; }
  .timer-fill { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s linear; filter: drop-shadow(0 2px 8px rgba(0,122,255,0.35)); }
  .timer-center {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .timer-time { font-family: var(--font-mono); font-size: 36px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .timer-mode { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
  .focus-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .focus-btn {
    border: 1px solid transparent; border-radius: var(--r-pill); padding: 13px 22px; font-size: 14px; font-weight: 600; letter-spacing: -0.005em;
    cursor: pointer; touch-action: manipulation; min-height: 46px;
    transition: opacity .15s, transform .12s var(--ease), box-shadow .15s var(--ease), background .15s;
  }
  .focus-btn:active { transform: scale(0.95); }
  .focus-btn.primary { background: var(--accent); color: #fff; }
  .focus-btn.primary:hover { opacity: 0.92; box-shadow: 0 6px 18px rgba(0,122,255,0.35); }
  .focus-btn.ghost { background: var(--surface-sunken); color: var(--ink); border-color: transparent; }
  .focus-btn.ghost:hover { background: var(--line); }
  .focus-btn.complete { background: var(--surface-sunken); color: var(--accent); border-color: var(--accent-soft-line); }
  .focus-sub { width: 100%; text-align: left; margin-top: 4px; }
  .focus-pick { margin-top: 6px; font-size: 12.5px; color: var(--muted); }
  .focus-pick select {
    border: 1px solid var(--line); border-radius: var(--r-sm); padding: 7px 10px; font-size: 12.5px;
    background: var(--surface-sunken); color: var(--ink); font-family: inherit; margin-top: 4px; max-width: 100%;
  }
  .focus-empty {
    max-width: 420px; text-align: center; color: var(--muted); font-size: 14.5px;
    background: var(--surface); border: 1.5px dashed var(--line-strong); border-radius: var(--r-lg); padding: 32px 22px;
  }

  /* ---------- bloc de notas ---------- */
  .note-add {
    display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px;
    padding: 14px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); box-shadow: var(--shadow);
  }
  .note-add textarea {
    width: 100%; font-size: 14.5px; font-family: inherit; color: var(--ink);
    background: var(--surface-sunken); border: 1px solid var(--line); border-radius: var(--r-sm);
    padding: 12px 14px; resize: vertical; min-height: 64px;
    transition: border-color .15s var(--ease);
  }
  .note-add textarea:focus { outline: none; border-color: var(--accent); }
  .note-add button {
    align-self: flex-end; background: var(--accent); color: #fff;
    border: none; border-radius: var(--r-pill); padding: 10px 18px;
    font-size: 12.5px; font-weight: 600; letter-spacing: 0; text-transform: none;
    cursor: pointer; touch-action: manipulation;
    transition: opacity .15s, transform .12s var(--ease);
  }
  .note-add button:hover { opacity: 0.9; }
  .note-add button:active { transform: scale(0.95); }
  .note-list { display: flex; flex-direction: column; gap: 10px; }
  .note-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); padding: 16px 18px;
    box-shadow: var(--shadow);
    animation: settle-in var(--dur-2) var(--ease) both;
    transition: border-color .2s var(--ease), transform .16s var(--ease), box-shadow .2s var(--ease);
  }
  .note-card:hover { border-color: var(--line-strong); transform: translateY(-1px); box-shadow: var(--shadow-hover); }
  .note-body {
    width: 100%; font-size: 14.5px; font-family: inherit; color: var(--ink);
    background: none; border: none; resize: vertical; padding: 0; min-height: 40px;
  }
  .note-body:focus { outline: none; }
  .note-footer {
    display: flex; align-items: center; justify-content: space-between; margin-top: 10px;
    padding-top: 10px; border-top: 1px solid var(--line);
  }
  .note-date { font-family: var(--font-mono); font-size: 11px; color: var(--faint); font-variant-numeric: tabular-nums; }
  .note-del {
    background: none; border: none; color: var(--faint); cursor: pointer;
    font-size: 11px; font-weight: 600; text-transform: none; letter-spacing: 0;
    padding: 0; touch-action: manipulation; transition: color .15s var(--ease);
  }
  .note-del:hover { color: var(--bad); }

  /* ---------- confetti ---------- */
  .confetti-piece {
    position: fixed; top: 0; left: 0; width: 7px; height: 7px; border-radius: 2px;
    pointer-events: none; z-index: 999; opacity: 1;
    animation: confetti-fall 750ms cubic-bezier(0.23,1,0.32,1) forwards;
  }
  @keyframes confetti-fall {
    to { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; }
  }

  /* ---------- toast compartir ---------- */
  .share-toast {
    position: fixed; left: 50%; bottom: 90px; transform: translateX(-50%);
    background: var(--surface-glass); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%);
    color: var(--ink); border: 1px solid var(--line); border-radius: var(--r-md);
    padding: 12px 14px; display: flex; align-items: center; gap: 12px;
    font-size: 13px; font-weight: 500; box-shadow: var(--shadow-hover);
    z-index: 80; max-width: calc(100vw - 32px);
    animation: toast-in var(--dur-3) var(--ease) both;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translate(-50%, 12px) scale(0.95); }
    to { opacity: 1; transform: translate(-50%, 0) scale(1); }
  }
  .share-toast-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 40vw; }
  .share-toast-btn {
    background: var(--accent); color: #fff; border: none; border-radius: var(--r-pill);
    padding: 7px 12px; font-size: 12px; font-weight: 600; cursor: pointer; flex: none;
    touch-action: manipulation; transition: opacity .15s, transform .12s var(--ease);
  }
  .share-toast-btn:hover { opacity: 0.9; }
  .share-toast-btn:active { transform: scale(0.94); }
  .share-toast-close {
    background: none; border: none; color: var(--muted); opacity: 0.8; cursor: pointer;
    font-size: 16px; padding: 0 2px; flex: none; touch-action: manipulation;
  }
  .share-toast-close:hover { opacity: 1; }
  @media (max-width: 640px) {
    .share-toast { bottom: calc(env(safe-area-inset-bottom) + 92px); }
  }

  /* ---------- bosque ---------- */
  .grow-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg); padding: 32px 24px; text-align: center; margin-bottom: 24px;
    animation: settle-in var(--dur-3) var(--ease) both;
  }
  .grow-tree {
    font-size: 64px; line-height: 1; margin-bottom: 10px; display: inline-block;
    transition: transform .5s var(--ease-stamp), opacity .4s var(--ease), filter .4s var(--ease);
  }
  .grow-label { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
  .grow-sub { font-size: 12.5px; color: var(--muted); }
  .grow-bar { width: 100%; max-width: 260px; height: 6px; border-radius: var(--r-pill); background: var(--surface-sunken); overflow: hidden; margin: 16px auto 0; }
  .grow-bar-fill { height: 100%; background: var(--accent); border-radius: var(--r-pill); transition: width .5s var(--ease); }
  .species-picker { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
  .species-btn {
    width: 46px; height: 46px; border-radius: var(--r-md); border: 1.5px solid var(--line);
    background: var(--surface-sunken); font-size: 22px; cursor: pointer; touch-action: manipulation;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .15s var(--ease), transform .12s var(--ease), background .15s var(--ease);
  }
  .species-btn:hover { border-color: var(--line-strong); }
  .species-btn:active { transform: scale(0.92); }
  .species-btn.active { border-color: var(--accent); background: var(--accent-soft); transform: scale(1.06); }

  .forest-stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
  .forest-stat { flex: 1; min-width: 110px; text-align: center; }
  .forest-stat-value { font-family: var(--font-display); font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  .forest-stat-label { font-size: 11.5px; color: var(--muted); font-weight: 500; margin-top: 2px; }

  .forest-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 10px;
  }
  .forest-tile {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md);
    padding: 10px 6px 8px; text-align: center; box-shadow: var(--shadow);
    animation: cascade-in var(--dur-2) var(--ease) both;
    transition: transform .16s var(--ease), box-shadow .16s var(--ease);
  }
  .forest-tile:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .forest-tile .tile-emoji { font-size: 26px; display: block; }
  .forest-tile.dead .tile-emoji { filter: grayscale(1); opacity: 0.55; }
  .forest-tile .tile-date { font-size: 9.5px; color: var(--faint); font-weight: 600; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .forest-empty {
    color: var(--faint); font-size: 13.5px; padding: 30px 4px; text-align: center;
    border: 1.5px dashed var(--line-strong); border-radius: var(--r-md);
  }
</style>
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="brand-mark" style="margin:0 auto 14px;">🧠</div>
    <h1 class="rounded-face" style="text-align:center;font-size:24px;margin:0 0 4px;">Mente</h1>
    <p style="text-align:center;color:var(--muted);font-size:13.5px;margin:0 0 20px;">Inicia sesión para sincronizar tus tareas y recibir recordatorios push.</p>
    <input type="email" id="authEmail" placeholder="Email" autocomplete="email" required />
    <input type="password" id="authPassword" placeholder="Contraseña" autocomplete="current-password" required />
    <div class="auth-error" id="authError"></div>
    <button type="button" class="auth-submit" id="authSignIn">Ingresar</button>

  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div class="brandblock">
      <div class="brand-mark">🧠</div>
      <div class="brand-text">
        <div class="brand rounded-face">Mente</div>
        <div class="tagline" id="todayDate"></div>
      </div>
    </div>
    <div class="headctrls">
      <div class="ring-wrap" title="Progreso de hoy">
        <svg viewBox="0 0 40 40">
          <circle class="ring-track" cx="20" cy="20" r="16"></circle>
          <circle class="ring-fill" id="ringFill" cx="20" cy="20" r="16" stroke-dasharray="100.5" stroke-dashoffset="100.5"></circle>
        </svg>

      <button class="pillbtn streak-chip" id="streakChip" title="Racha de días activos">🔥 <span id="streakNum">0</span></button>
      <button class="pillbtn" id="soundBtn" data-on="true" title="Sonido al completar">🔊</button>
      <button class="pillbtn" id="notifBtn" data-on="false">🔔 <span id="notifLabel">Recordatorios</span></button>
      <button class="pillbtn" id="signOutBtn" title="Cerrar sesión">Salir</button>

  <div class="scope-switch" id="scopeSwitch">
    <button type="button" class="scope-btn active" data-scope="todo">Todo</button>

  <div class="inbox-quickadd">

  <div class="quickadd">

        <input type="date" id="inpDate" />

        <div class="pri-chips" id="priChips"></div>
        <div class="repeat-chips" id="repeatChips"></div>
        <button type="button" class="chip-select" id="reqPhotoChip">📷 Requiere foto para completarla</button>
        <button type="button" class="chip-select" id="reqConfirmChip">🤝 Requiere confirmación de alguien más</button>
        <input type="text" id="confirmPersonInput" class="confirm-person-input" placeholder="¿Quién la va a confirmar? (opcional)" autocomplete="off" style="display:none;" />
      </div>

  <div class="tabs">

    <button class="tab" data-view="inbox"><span class="tab-icon">📥</span><span class="tab-label">Inbox</span> <span class="count" id="cntInbox">0</span></button>

    <button class="tab" data-view="enfoque"><span class="tab-icon">🎯</span><span class="tab-label">Enfoque</span></button>

<script>
(function () {
  var cfg = window.MENTE_CONFIG;
  var sb = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
  var currentUserId = null;

  var STREAK_KEY = 'mente_streak_days';
  var PREFS_KEY = 'mente_prefs_v1';

  var CATS = [
    { id: 'personal', label: 'Personal', color: 'var(--accent)', icon: '🏠' },
    { id: 'trabajo', label: 'Trabajo', color: 'var(--accent2)', icon: '💼' }
  ];
  function catInfo(id) { return CATS.find(function (c) { return c.id === id; }) || CATS[0]; }

  var TREE_TYPES = [
    { id: 'roble', label: 'Roble', emoji: '🌳' },
    { id: 'pino', label: 'Pino', emoji: '🌲' },
    { id: 'palmera', label: 'Palmera', emoji: '🌴' },
    { id: 'abeto', label: 'Abeto', emoji: '🎄' },
    { id: 'cerezo', label: 'Cerezo', emoji: '🌸' },
    { id: 'cactus', label: 'Cactus', emoji: '🌵' }
  ];
  function treeInfo(id) { return TREE_TYPES.find(function (x) { return x.id === id; }) || TREE_TYPES[0]; }
  var FOREST_CHECK_KEY = 'mente_forest_last_check';
  var forestDays = [];

  var tasks = [];
  var notesData = [];

  var streakDays = [];
  try { streakDays = JSON.parse(localStorage.getItem(STREAK_KEY)) || []; } catch (e) { streakDays = []; }

  var prefs = { hideDoneHoy: false, sound: true, scopeFilter: 'todo', treeType: 'roble' };
  try { prefs = Object.assign(prefs, JSON.parse(localStorage.getItem(PREFS_KEY)) || {}); } catch (e) {}
  function inScope(t) { return prefs.scopeFilter === 'todo' || t.category === prefs.scopeFilter; }

  function saveStreak() { localStorage.setItem(STREAK_KEY, JSON.stringify(streakDays)); }
  function savePrefs() { localStorage.setItem(PREFS_KEY, JSON.stringify(prefs)); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function todayISO() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function fmtDay(date) { return date.toLocaleDateString('es-ES', { weekday: 'short' }).replace('.', ''); }
  function isoFromDate(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
  function addDays(dateStr, n) { var d = new Date(dateStr + 'T00:00:00'); d.setDate(d.getDate() + n); return isoFromDate(d); }
  function nextRepeatDate(dateStr, repeat) {
    if (!repeat) return null;
    if (repeat.type === 'daily') return addDays(dateStr, 1);
    if (repeat.type === 'every') return addDays(dateStr, repeat.n || 1);
    if (repeat.type === 'weekdays') {
      var d = new Date(dateStr + 'T00:00:00');
      do { d.setDate(d.getDate() + 1); } while (d.getDay() === 0 || d.getDay() === 6);
      return isoFromDate(d);
    }
    return null;
  }
  function repeatLabel(repeat) {
    if (!repeat) return '';
    if (repeat.type === 'daily') return '🔁 Diario';
    if (repeat.type === 'weekdays') return '🔁 Lun-Vie';
    if (repeat.type === 'every') return '🔁 cada ' + repeat.n + ' días';
    return '';
  }
  function reminderLabel(r) {
    if (r.repeat === 'daily') return '🔁 Diario · ' + r.time;
    if (r.repeat === 'weekdays') return '🔁 Días hábiles · ' + r.time;
    if (r.repeat === 'every') return '🔁 cada ' + r.n + ' días · ' + r.time;
    var day = (r.date === todayStr) ? 'Hoy' : new Date(r.date + 'T00:00:00').toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
    return day + ' ' + r.time;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }
  function hhmm(t) { return t ? String(t).slice(0, 5) : null; }

  /* ---------- Supabase: mapear filas <-> objetos en memoria ---------- */
  function rowToTask(row) {
    return {
      id: row.id,
      title: row.title,
      date: row.date,
      time: hhmm(row.time),
      priority: row.priority,
      category: row.category,
      star: row.star,
      done: row.done,
      repeat: row.repeat || null,
      seriesId: row.series_id || null,
      subtasks: row.subtasks || [],
      notes: row.notes || '',
      requiresPhoto: !!row.requires_photo,
      photos: row.photos || [],
      requiresConfirmation: !!row.requires_confirmation,
      confirmationToken: row.confirmation_token || null,
      confirmedAt: row.confirmed_at || null,
      confirmedBy: row.confirmed_by || null,
      confirmPerson: row.confirm_person || null,
      createdAt: row.created_at,
      reminders: (row.reminders || []).map(function (r) {
        return { id: r.id, time: hhmm(r.time), repeat: r.repeat, date: r.date, n: r.n };
      })
    };
  }
  function reminderFieldsFromTaskRepeat(repeat) {
    if (!repeat) return { repeat: 'once' };
    if (repeat.type === 'daily') return { repeat: 'daily' };
    if (repeat.type === 'weekdays') return { repeat: 'weekdays' };
    if (repeat.type === 'every') return { repeat: 'every', n: repeat.n };
    return { repeat: 'once' };
  }
  async function ensureTaskReminder(t) {
    if (!t.time) return;
    var rf = reminderFieldsFromTaskRepeat(t.repeat);
    var inserted = await dbInsertReminder(t.id, { time: t.time, repeat: rf.repeat, date: t.date, n: rf.n || null });
    if (inserted) t.reminders.push(inserted);
  }
  async function loadTasks() {
    var res = await sb.from('tasks').select('*, reminders(*)').order('created_at', { ascending: true });
    if (res.error) { console.error(res.error); return; }
    tasks = (res.data || []).map(rowToTask);
    tasks.forEach(function (t) {
      if (t.repeat && !t.seriesId) { t.seriesId = t.id; dbUpdateTask(t.id, { series_id: t.id }); }
    });
    // Repara tareas con fecha y hora que quedaron sin ningún recordatorio (por eso no avisaban).
    // Ojo: una serie repetitiva (diario/días hábiles/cada X) solo necesita UN recordatorio,
    // no uno por cada ocurrencia futura pre-generada — si no, se manda la notificación
    // duplicada una vez por cada ocurrencia (ej. 60 veces si hay 60 días adelantados).
    var seriesHasReminder = {};
    tasks.forEach(function (t) {
      if (t.seriesId && t.reminders.length) seriesHasReminder[t.seriesId] = true;
    });
    var backfills = [];
    tasks.forEach(function (t) {
      if (!t.time || t.done || t.reminders.length) return;
      if (t.seriesId) {
        if (seriesHasReminder[t.seriesId]) return;
        seriesHasReminder[t.seriesId] = true;
      }
      backfills.push(ensureTaskReminder(t));
    });
    if (backfills.length) await Promise.all(backfills);
    renderAll();
  }
  async function dbInsertTask(fields) {
    var payload = Object.assign({ user_id: currentUserId }, fields);
    var res = await sb.from('tasks').insert(payload).select('*, reminders(*)').single();
    if (res.error) { console.error(res.error); return null; }
    return rowToTask(res.data);
  }
  function dbUpdateTask(id, patch) { sb.from('tasks').update(patch).eq('id', id).then(function (r) { if (r.error) console.error(r.error); }); }
  function dbDeleteTask(id) { sb.from('tasks').delete().eq('id', id).then(function (r) { if (r.error) console.error(r.error); }); }

  /* ---------- fotos de tareas (Storage) ---------- */
  async function uploadTaskPhoto(taskId, file) {
    var ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg';
    var path = currentUserId + '/' + taskId + '/' + uid() + '.' + ext;
    var res = await sb.storage.from('task-photos').upload(path, file, { upsert: false, contentType: file.type || 'image/jpeg' });
    if (res.error) { console.error(res.error); alert('No se pudo subir la foto: ' + res.error.message); return null; }
    var pub = sb.storage.from('task-photos').getPublicUrl(path);
    return { path: path, url: pub.data.publicUrl };
  }
  async function addTaskPhoto(id, file) {
    var t = tasks.find(function (x) { return x.id === id; });
    if (!t) return;
    var photo = await uploadTaskPhoto(id, file);
    if (!photo) return;
    t.photos = (t.photos || []).concat([photo]);
    dbUpdateTask(id, { photos: t.photos });
    renderAll();
  }
  function removeTaskPhoto(id, path) {
    var t = tasks.find(function (x) { return x.id === id; });
    if (!t) return;
    t.photos = (t.photos || []).filter(function (p) { return p.path !== path; });
    dbUpdateTask(id, { photos: t.photos });
    sb.storage.from('task-photos').remove([path]).then(function (r) { if (r.error) console.error(r.error); });
    renderAll();
  }

  /* ---------- sound ---------- */
  var audioCtx = null;
  function getAudioCtx() {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function playTone(ctx, t0, freq, startAt, dur, gainPeak, type) {
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0 + startAt);
    gain.gain.setValueAtTime(0.0001, t0 + startAt);
    gain.gain.linearRampToValueAtTime(gainPeak, t0 + startAt + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + startAt + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t0 + startAt);
    osc.stop(t0 + startAt + dur + 0.02);
    return osc;
  }
  function chime() {
    if (!prefs.sound) return;
    try {
      var ctx = getAudioCtx();
      var t0 = ctx.currentTime;
      playTone(ctx, t0, 660, 0, 0.22, 0.12, 'triangle');
      playTone(ctx, t0, 880, 0.09, 0.24, 0.12, 'triangle');
    } catch (e) {}
  }
  function addSound() {
    if (!prefs.sound) return;
    try {
      var ctx = getAudioCtx();
      playTone(ctx, ctx.currentTime, 720, 0, 0.1, 0.09, 'sine');
    } catch (e) {}
  }
  function deleteSound() {
    if (!prefs.sound) return;
    try {
      var ctx = getAudioCtx();
      var t0 = ctx.currentTime;
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(420, t0);
      osc.frequency.exponentialRampToValueAtTime(160, t0 + 0.16);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.linearRampToValueAtTime(0.09, t0 + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.18);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t0);
      osc.stop(t0 + 0.2);
    } catch (e) {}
  }
  function starSound() {
    if (!prefs.sound) return;
    try {
      var ctx = getAudioCtx();
      var t0 = ctx.currentTime;
      playTone(ctx, t0, 988, 0, 0.16, 0.1, 'triangle');
      playTone(ctx, t0, 1318.5, 0.06, 0.18, 0.09, 'triangle');
    } catch (e) {}
  }

  /* ---------- confetti ---------- */
  function confettiBurst(x, y) {
    var colors = ['#007aff', '#ff9500', '#34c759', '#ff2d55', '#5856d6', '#ffcc00'];
    for (var i = 0; i < 16; i++) {
      var el = document.createElement('div');
      el.className = 'confetti-piece';
      var angle = Math.random() * Math.PI * 2;
      var dist = 40 + Math.random() * 60;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.background = colors[i % colors.length];
      el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      el.style.setProperty('--dy', (Math.sin(angle) * dist - 20) + 'px');
      el.style.setProperty('--rot', (Math.random() * 360) + 'deg');
      document.body.appendChild(el);
      (function (node) { setTimeout(function () { node.remove(); }, 950); })(el);
    }
  }

  /* ---------- compartir ---------- */
  async function shareTask(id) {
    var t = tasks.find(function (x) { return x.id === id; });
    if (!t) return;
    var text = '✅ ' + t.title + (t.notes ? '\n\n' + t.notes : '');
    var shareData = { title: 'Mente', text: text };
    if (window.navigator.share && window.navigator.canShare && t.photos && t.photos.length) {
      try {
        var files = [];
        for (var i = 0; i < Math.min(t.photos.length, 4); i++) {
          var res = await fetch(t.photos[i].url);
          var blob = await res.blob();
          var ext = (t.photos[i].path.split('.').pop() || 'jpg');
          files.push(new File([blob], 'foto' + (i + 1) + '.' + ext, { type: blob.type || 'image/jpeg' }));
        }
        if (window.navigator.canShare({ files: files })) shareData.files = files;
      } catch (e) { console.error(e); }
    }
    if (window.navigator.share) {
      try { await window.navigator.share(shareData); } catch (e) { /* el usuario canceló, no hacer nada */ }
    } else if (window.navigator.clipboard) {
      try { await window.navigator.clipboard.writeText(text); alert('Tu navegador no soporta compartir directo — copié el texto al portapapeles.'); }
      catch (e) { alert(text); }
    } else {
      alert(text);
    }
  }

  /* ---------- streak ---------- */
  function markStreakToday() {
    if (streakDays.indexOf(todayStr) === -1) { streakDays.push(todayStr); saveStreak(); }
    updateStreakUI();
  }
  function currentStreak() {
    var set = {};
    streakDays.forEach(function (d) { set[d] = true; });
    var count = 0;
    var cursor = new Date();
    if (!set[todayStr]) cursor.setDate(cursor.getDate() - 1);
    while (true) {
      var iso = cursor.getFullYear() + '-' + String(cursor.getMonth()+1).padStart(2,'0') + '-' + String(cursor.getDate()).padStart(2,'0');
      if (set[iso]) { count++; cursor.setDate(cursor.getDate() - 1); } else break;
    }
    return count;
  }
  function updateStreakUI() { document.getElementById('streakNum').textContent = currentStreak(); }

  /* ---------- bosque: árbol del día + historial ---------- */
  async function fetchForest() {
    var res = await sb.from('tree_days').select('*').order('date', { ascending: false });
    if (res.error) { console.error(res.error); return; }
    forestDays = res.data || [];
  }
  async function evaluateForestDays() {
    var lastCheck = localStorage.getItem(FOREST_CHECK_KEY);
    var yesterday = addDays(todayStr, -1);
    var start = lastCheck ? addDays(lastCheck, 1) : yesterday;
    if (start > yesterday) return;
    var rowsToInsert = [];
    var d = start;
    while (d <= yesterday) {
      var dayTasks = tasks.filter(function (t) { return t.date === d; });
      if (dayTasks.length) {
        var allDone = dayTasks.every(function (t) { return t.done; });
        rowsToInsert.push({
          user_id: currentUserId, date: d,
          tree_type: prefs.treeType || 'roble',
          status: allDone ? 'bloomed' : 'dead'
        });
      }
      d = addDays(d, 1);
    }
    if (rowsToInsert.length) {
      var res = await sb.from('tree_days').upsert(rowsToInsert, { onConflict: 'user_id,date', ignoreDuplicates: true });
      if (res.error) console.error(res.error);
    }
    localStorage.setItem(FOREST_CHECK_KEY, yesterday);
    await fetchForest();
  }
  function todayGrowthPct() {
    var hoyAll = tasks.filter(function (t) { return t.date === todayStr; });
    if (!hoyAll.length) return 0;
    var done = hoyAll.filter(function (t) { return t.done; }).length;
    return Math.round(done / hoyAll.length * 100);
  }
  function growthStage(pct, hasTasksToday) {
    if (!hasTasksToday) return { emoji: '🌱', label: 'Sin pendientes hoy todavía', scale: 0.75, opacity: 0.6 };
    if (pct === 0) return { emoji: '🌱', label: 'Apenas empezando', scale: 0.8, opacity: 0.7 };
    if (pct < 33) return { emoji: '🌿', label: 'Brotando', scale: 0.85, opacity: 0.8 };
    if (pct < 66) return { emoji: treeInfo(prefs.treeType).emoji, label: 'Creciendo', scale: 0.9, opacity: 0.9 };
    if (pct < 100) return { emoji: treeInfo(prefs.treeType).emoji, label: 'Casi listo', scale: 1, opacity: 1 };
    return { emoji: '🌸', label: '¡Floreció! Se plantará en tu bosque esta noche', scale: 1.15, opacity: 1 };
  }
  function renderBosque() {
    var wrap = document.getElementById('bosqueWrap');
    var hoyAll = tasks.filter(function (t) { return t.date === todayStr; });
    var pct = todayGrowthPct();
    var stage = growthStage(pct, hoyAll.length > 0);
    var bloomedCount = forestDays.filter(function (d) { return d.status === 'bloomed'; }).length;
    var deadCount = forestDays.filter(function (d) { return d.status === 'dead'; }).length;

    var growHtml =
      '<div class="grow-card">' +
        '<div class="grow-tree" style="transform:scale(' + stage.scale + ');opacity:' + stage.opacity + '">' + stage.emoji + '</div>' +
        '<div class="grow-label">' + stage.label + '</div>' +
        '<div class="grow-sub">' + (hoyAll.length ? pct + '% de tus pendientes de hoy completados' : 'Agrega pendientes con fecha de hoy para que tu árbol empiece a crecer') + '</div>' +
        (hoyAll.length ? '<div class="grow-bar"><div class="grow-bar-fill" style="width:' + pct + '%"></div></div>' : '') +
        '<div class="species-picker">' + TREE_TYPES.map(function (sp) {
          return '<button type="button" class="species-btn' + (prefs.treeType === sp.id ? ' active' : '') + '" data-species="' + sp.id + '" title="' + sp.label + '">' + sp.emoji + '</button>';
        }).join('') + '</div>' +
      '</div>';

    var statsHtml =
      '<div class="forest-stats">' +
        '<div class="forest-stat"><div class="forest-stat-value">' + bloomedCount + '</div><div class="forest-stat-label">🌳 árboles en tu bosque</div></div>' +
        '<div class="forest-stat"><div class="forest-stat-value">' + deadCount + '</div><div class="forest-stat-label">🥀 días perdidos</div></div>' +
      '</div>';

    var gridHtml = forestDays.length
      ? '<div class="forest-grid">' + forestDays.map(function (d) {
          var isDead = d.status === 'dead';
          var emoji = isDead ? '🥀' : treeInfo(d.tree_type).emoji;
          var dd = new Date(d.date + 'T00:00:00');
          var label = dd.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
          return '<div class="forest-tile' + (isDead ? ' dead' : '') + '"><span class="tile-emoji">' + emoji + '</span><span class="tile-date">' + label + '</span></div>';
        }).join('') + '</div>'
      : '<div class="forest-empty">Todavía no tienes árboles plantados. Completa todos tus pendientes de hoy y esta noche tu árbol florecerá aquí. 🌱</div>';

    wrap.innerHTML = growHtml + statsHtml + gridHtml;

    wrap.querySelectorAll('.species-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        prefs.treeType = btn.dataset.species;
        savePrefs();
        renderBosque();
      });
    });
  }

  /* ---------- push notifications ---------- */
  function urlBase64ToUint8Array(base64String) {
    var padding = '='.repeat((4 - base64String.length % 4) % 4);
    var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    var rawData = window.atob(base64);

  async function handleGoogleOAuthReturn() {

    var code = params.get('code');
    if (!code) return;
    window.history.replaceState({}, '', window.location.pathname);
    var statusEl = document.getElementById('googleCalStatus');
    if (statusEl) statusEl.textContent = 'Conectando con Google…';
    var sessionRes = await sb.auth.getSession();
    var token = sessionRes.data.session && sessionRes.data.session.access_token;
    if (!token) return;
    try {
      var resp = await fetch(cfg.SUPABASE_URL + '/functions/v1/google-oauth-exchange', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
          code: code,
          redirect_uri: googleRedirectUri(),
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
        })
      });
      var data = await resp.json();
      if (data.ok) { alert('Google Calendar conectado. Tus tareas con fecha se van a sincronizar solas.'); }
      else { alert('No se pudo conectar con Google.\n\nHTTP ' + resp.status + '\n' + JSON.stringify(data, null, 2)); }

      alert('Esta tarea necesita al menos una foto antes de poder marcarla como cumplida. Ábrela con ☰ y agrégala en "Fotos".');
      var panel = document.querySelector('.subtasks[data-owner="' + id + '"]');

      return;
    }
    if (!t.done && t.requiresConfirmation && !t.confirmedAt) {
      alert('Esta tarea necesita que ' + (t.confirmPerson || 'la otra persona') + ' la confirme antes de poder marcarla como cumplida. Ábrela con ☰ y toca "Enviar para confirmar".');
      var panel2 = document.querySelector('.subtasks[data-owner="' + id + '"]');
      if (panel2) panel2.classList.add('open');
      return;
    }

    renderAll();
    dbUpdateTask(id, { done: t.done });
    if (t.done) {
      markStreakToday();
      chime();
      var rect = evt && evt.target ? evt.target.getBoundingClientRect() : { left: window.innerWidth/2, top: window.innerHeight/2, width: 0, height: 0 };
      confettiBurst(rect.left + rect.width/2, rect.top + rect.height/2);
      showShareToast(id);
      if (t.repeat && t.date && t.seriesId) {
        var nextDate = nextRepeatDate(t.date, t.repeat);
        if (nextDate) {
          var already = await sb.from('tasks').select('id').eq('series_id', t.seriesId).eq('date', nextDate).maybeSingle();
          if (!already.data) {
            var inserted = await dbInsertTask({
              title: t.title, date: nextDate, time: t.time, priority: t.priority, category: t.category,
              star: false, done: false, repeat: t.repeat, series_id: t.seriesId,
              subtasks: t.subtasks.map(function (s) { return { id: uid(), title: s.title, done: false }; })
            });

          }

  function propagateToSeries(seriesId, exceptId, patch) {
    if (!seriesId) return;
    tasks.forEach(function (x) {
      if (x.seriesId === seriesId && !x.done && x.id !== exceptId) Object.assign(x, patch);
    });

  function syncReminderTimes(t, newTime, propagate) {
    var targets = t.reminders.slice();
    if (propagate && t.seriesId && t.seriesId !== t.id) {
      var original = tasks.find(function (x) { return x.id === t.seriesId; });
      if (original) targets = targets.concat(original.reminders);
    }
    targets.forEach(function (r) {
      r.time = newTime;

    });

  function editTaskTime(id) {
    var t = tasks.find(function (x) { return x.id === id; });
    if (!t) return;
    var val = prompt('Nueva hora (HH:MM):', t.time || '');
    if (val === null) return;
    val = val.trim();
    if (!/^\d{1,2}:\d{2}$/.test(val)) { alert('Formato inválido. Usa HH:MM, por ejemplo 09:30.'); return; }
    var parts = val.split(':');
    var hh = String(Math.min(23, parseInt(parts[0], 10))).padStart(2, '0');
    var mm = String(Math.min(59, parseInt(parts[1], 10))).padStart(2, '0');
    var newTime = hh + ':' + mm;
    t.time = newTime;
    dbUpdateTask(id, { time: newTime });
    var propagate = !!(t.seriesId && confirmSeriesPropagation());
    syncReminderTimes(t, newTime, propagate);
    if (propagate) propagateToSeries(t.seriesId, id, { time: newTime });

        '<label class="photo-add-btn">+ Agregar<input type="file" accept="image/*" data-action="photoinput" hidden /></label>' +
      '</div>' +
      (t.requiresConfirmation && !t.confirmedAt
        ? '<button type="button" class="confirm-send-btn" data-action="sendconfirm">📤 Enviar para confirmar' + (t.confirmPerson ? ' a ' + escapeHtml(t.confirmPerson) : '') + '</button>' +
          '<button type="button" class="confirm-send-btn" data-action="refreshconfirm" style="margin-left:6px;">🔄 Ya confirmó, actualizar</button>'
        : '') +
      '</div>';

    return '<div class="task' + (t.done ? ' done' : '') + '" data-id="' + t.id + '" style="--cat-color:' + cat.color + '">' +
      '<div class="check' + (t.requiresConfirmation && !t.confirmedAt ? ' locked' : '') + '" data-action="toggle" title="' + (t.requiresConfirmation && !t.confirmedAt ? 'Necesita confirmación' : '') + '">' + (t.done ? '✓' : (t.requiresConfirmation && !t.confirmedAt ? '🔒' : '')) + '</div>' +
      '<div class="task-body">' +
        '<div class="task-title-row">' +
          '<input class="task-title" data-action="edit" value="' + escapeHtml(t.title).replace(/"/g,'&quot;') + '" ' + (t.done ? 'readonly' : '') + ' />' +
          '<button type="button" class="star-btn' + (t.star ? ' on' : '') + '" data-action="star" title="Prioridad de hoy">' + (t.star ? '⭐' : '☆') + '</button>' +
        '</div>' +
        '<div class="task-meta">' + meta + '</div>' +
        subProgress +
        confirmStatusHtml +
        subtasksHtml +
      '</div>' +
      '<div class="task-actions">' +
        (t.done ? '<button type="button" class="expand-btn" data-action="share" title="Compartir">📤</button>' : '') +
        '<button type="button" class="expand-btn" data-action="expand" title="Subtareas">☰</button><button type="button" class="task-del" data-action="del">×</button></div>' +
      '</div>';
